<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaChat — Auth</title>
    
    <!-- Iconify -->
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    
    <style>
        /* ========== إعادة تعيين وتنسيقات أساسية ========== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0F172A;         /* خلفية داكنة - ثيم بنفسجي */
            min-height: 100vh;
            display: flex;                /* لتمركز الكارد في منتصف الشاشة */
            align-items: center;          /* توسيط عمودي */
            justify-content: center;      /* توسيط أفقي */
        }

        /* ========== حاوية الصفحة ========== */
        .page {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;                /* مسافة داخلية حتى لا يلتصق الكارد بالحواف على الموبايل */
        }

        /* ========== الكارد الأساسي ========== */
        .card {
            background: #1E293B;          /* أغمق قليلاً من الخلفية */
            border-radius: 24px;          /* زوايا مدورة واضحة */
            padding: 40px 36px;
            width: 100%;
            max-width: 380px;             /* عرض الكارد كما في التصميم تقريباً */
            display: flex;
            flex-direction: column;       /* ترتيب العناصر عمودياً */
            align-items: center;
            gap: 16px;                    /* مسافة منتظمة بين العناصر */
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5); /* ظل ليبدو الكارد طافياً فوق الخلفية */
            border: 1px solid rgba(124, 58, 237, 0.3);  /* حدود بنفسجية خفيفة */
        }

        /* ========== الأيقونة الدائرية العلوية ========== */
        .avatar-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;           /* شكل دائري كامل */
            background: linear-gradient(135deg, #7C3AED, #1F2937); /* تدرج بنفسجي */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 8px;
            color: #ffffff;
        }

        /* ========== العنوان ========== */
        h2 {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 4px;
        }

        /* ========== حقل الإدخال (حاوية الأيقونة + الإدخال) ========== */
        .field {
            width: 100%;
            display: flex;                /* لجعل الأيقونة وحقل الإدخال في سطر واحد */
            align-items: center;
            gap: 10px;
            background: #1F2937;          /* خلفية الحقل - ثيم بنفسجي */
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid rgba(124, 58, 237, 0.35); /* حدود بنفسجية */
        }

        .field iconify-icon {
            font-size: 20px;
            color: #9D5CF6;              /* لون بنفسجي فاتح للأيقونات */
            flex-shrink: 0;              /* الأيقونة تحافظ على حجمها ولا تنضغط */
        }

        .field input {
            background: transparent;      /* شفاف ليظهر خلفية الحقل الأب */
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 15px;
            width: 100%;
        }

        .field input::placeholder {
            color: #6b7280;               /* لون باهت للنص الإرشادي */
        }

        /* ========== رابط نسيت كلمة المرور ========== */
        .forgot {
            width: 100%;
            text-align: right;            /* محاذاة لليمين */
            margin-top: -8px;             /* تقريبه من حقل كلمة المرور أعلاه */
        }

        .forgot a {
            color: #9D5CF6;              /* بنفسجي فاتح */
            font-size: 13px;
            text-decoration: none;
        }

        .forgot a:hover {
            color: #C4B5FD;              /* أفتح عند التحويم */
        }

        /* ========== الأزرار ========== */
        button {
            width: 100%;
            padding: 14px;
            background: #7C3AED;          /* بنفسجي أساسي */
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #5B21B6;          /* بنفسجي أغمق عند التحويم */
        }

        button:active {
            transform: scale(0.98);       /* تأثير ضغط الزر */
        }

        /* ========== نص التبديل بين النماذج ========== */
        .switch {
            font-size: 13px;
            color: #9CA3AF;              /* رمادي فاتح */
        }

        .switch span {
            color: #9D5CF6;              /* بنفسجي فاتح */
            cursor: pointer;
            font-weight: 600;
        }

        .switch span:hover {
            text-decoration: underline;
            color: #C4B5FD;
        }

        /* ========== رسائل الخطأ ========== */
        .error {
            width: 100%;
            color: #f87171;
            font-size: 13px;
            min-height: 16px;             /* يحافظ على المساحة حتى لو كانت فارغة فلا يتحرك الكارد */
            text-align: center;
        }
    </style>
</head>
<body>

<div class="page">

    <!-- ========== كارد تسجيل الدخول ========== -->
    <div class="card" id="login-form">
        <div class="avatar-icon">
            <iconify-icon icon="mdi:account-circle" style="font-size: 50px;"></iconify-icon>
        </div>
        <h2>Login</h2>

        <div class="field">
            <iconify-icon icon="mdi:email-outline"></iconify-icon>
            <input type="email" id="login-email" placeholder="jane.doe@example.com">
        </div>

        <div class="field">
            <iconify-icon icon="mdi:lock-outline"></iconify-icon>
            <input type="password" id="login-password" placeholder="••••••">
        </div>

        <p class="error" id="login-error"></p>

        <div class="forgot">
            <a href="#">Forgot password?</a>
        </div>

        <button id="btn-login">Log in</button>

        <p class="switch">Don't have an account? <span id="go-signup">Sign Up</span></p>
    </div>

    <!-- ========== كارد إنشاء الحساب (مخفي افتراضياً) ========== -->
    <div class="card" id="signup-form" style="display:none">
        <div class="avatar-icon">
            <iconify-icon icon="mdi:account-plus" style="font-size: 50px;"></iconify-icon>
        </div>
        <h2>Create Account</h2>

        <div class="field">
            <iconify-icon icon="mdi:card-account-details-outline"></iconify-icon>
            <input type="text" id="signup-displayname" placeholder="Display Name">
        </div>

        <div class="field">
            <iconify-icon icon="mdi:account-outline"></iconify-icon>
            <input type="text" id="signup-username" placeholder="Username">
        </div>

        <div class="field">
            <iconify-icon icon="mdi:email-outline"></iconify-icon>
            <input type="email" id="signup-email" placeholder="Email">
        </div>

        <div class="field">
            <iconify-icon icon="mdi:lock-outline"></iconify-icon>
            <input type="password" id="signup-password" placeholder="Password">
        </div>

        <p class="error" id="signup-error"></p>

        <button id="btn-signup">Create Account</button>

        <p class="switch">Already have an account? <span id="go-login">Log In</span></p>
    </div>

</div>

<script type="module">
    // ========== استيراد Firebase ==========
    import { auth, db } from "./firebase-config.js";

    import {
        createUserWithEmailAndPassword,
        signInWithEmailAndPassword,
        onAuthStateChanged,
        updateProfile  // ← جديد: لتحديث البروفايل
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    import {
        doc, 
        setDoc, 
        getDoc,     // ← جديد: للتحقق من وجود الوثيقة
        serverTimestamp,
        updateDoc   // ← جديد: لتحديث آخر تسجيل دخول
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ========== التحقق التلقائي عند فتح الصفحة ==========
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            // ← جديد: التأكد من وجود بيانات المستخدم في Firestore
            await ensureUserDataInFirestore(user);
            window.location.href = "index.html";
        }
    });

    // ========== عناصر DOM ==========
    const loginForm   = document.getElementById('login-form');
    const signupForm  = document.getElementById('signup-form');
    const loginError  = document.getElementById('login-error');
    const signupError = document.getElementById('signup-error');

    // ========== التبديل بين الفورمين ==========
    document.getElementById('go-signup').addEventListener('click', () => {
        loginForm.style.display  = 'none';
        signupForm.style.display = 'flex';
        loginError.textContent   = '';
        signupError.textContent  = '';
    });

    document.getElementById('go-login').addEventListener('click', () => {
        signupForm.style.display = 'none';
        loginForm.style.display  = 'flex';
        loginError.textContent   = '';
        signupError.textContent  = '';
    });

    // ========== دالة التحقق من صحة البريد الإلكتروني ==========
    function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    /**
     * ========== دالة التأكد من وجود بيانات المستخدم في Firestore ==========
     * 
     * شرح الدالة:
     * 1. نحاول نجيب بيانات المستخدم من Firestore باستخدام uid
     * 2. لو البيانات مش موجودة (مثلاً المستخدم اتحذف من Firestore أو حصل خطأ)
     * 3. بنضيف البيانات تلقائياً من معلومات حساب Firebase Auth
     * 
     * @param {object} user - كائن المستخدم من Firebase Auth
     */
    async function ensureUserDataInFirestore(user) {
        try {
            const userRef = doc(db, "users", user.uid);
            const userSnap = await getDoc(userRef);

            if (!userSnap.exists()) {
                // البيانات مش موجودة → نضيفها تلقائياً
                console.log("⚠️ بيانات المستخدم مش موجودة في Firestore. جاري إضافتها...");
                
                // استخراج اسم المستخدم من الإيميل (قبل علامة @)
                const usernameFromEmail = user.email ? user.email.split('@')[0] : 'user';
                
                await setDoc(userRef, {
                    uid:            user.uid,
                    email:          user.email || '',
                    username:       usernameFromEmail.toLowerCase(),
                    displayName:    user.displayName || usernameFromEmail,
                    photoURL:       user.photoURL || '',
                    theme:          "dark",
                    bio:            "",
                    status:         "online",
                    createdAt:      serverTimestamp(),
                    lastLogin:      serverTimestamp(),
                    searchKeywords: [
                        usernameFromEmail.toLowerCase(), 
                        (user.displayName || usernameFromEmail).toLowerCase()
                    ]
                });
                
                console.log("✅ تم إضافة بيانات المستخدم بنجاح إلى Firestore");
            } else {
                // البيانات موجودة → نحدث آخر تسجيل دخول
                console.log("✅ بيانات المستخدم موجودة بالفعل. جاري تحديث آخر تسجيل دخول...");
                await updateDoc(userRef, {
                    lastLogin: serverTimestamp(),
                    status: "online"
                });
            }
        } catch (error) {
            console.error("❌ خطأ في التأكد من بيانات المستخدم:", error);
            // حتى لو حصل خطأ، نكمل تسجيل الدخول عادي
        }
    }

    /**
     * ========== دالة إنشاء بيانات المستخدم الكاملة ==========
     * 
     * شرح الدالة:
     * تُستخدم عند التسجيل لأول مرة أو عند تسجيل الدخول لمستخدم
     * تم حذف بياناته من Firestore لأي سبب
     * 
     * @param {object} user - كائن المستخدم من Firebase Auth
     * @param {object} extraData - بيانات إضافية (username, displayName)
     */
    async function createUserData(user, extraData = {}) {
        const userRef = doc(db, "users", user.uid);
        
        // دمج البيانات الأساسية مع البيانات الإضافية
        const userData = {
            uid:            user.uid,
            email:          user.email || '',
            username:       extraData.username || user.email.split('@')[0].toLowerCase(),
            displayName:    extraData.displayName || user.displayName || user.email.split('@')[0],
            photoURL:       user.photoURL || '',
            theme:          "dark",
            bio:            "",
            status:         "online",
            createdAt:      serverTimestamp(),
            lastLogin:      serverTimestamp(),
            searchKeywords: [
                (extraData.username || user.email.split('@')[0]).toLowerCase(),
                (extraData.displayName || user.displayName || user.email.split('@')[0]).toLowerCase()
            ]
        };

        await setDoc(userRef, userData);
        console.log("✅ تم إنشاء بيانات المستخدم في Firestore:", userData);
        return userData;
    }

    // ========== معالجة تسجيل الدخول ==========
    document.getElementById('btn-login').addEventListener('click', async () => {
        const email    = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;

        loginError.textContent = '';

        // التحقق من الحقول الفارغة
        if (!email || !password) {
            loginError.textContent = 'Please fill in all fields.';
            return;
        }

        // التحقق من صحة البريد الإلكتروني
        if (!isValidEmail(email)) {
            loginError.textContent = 'Please enter a valid email address.';
            return;
        }

        try {
            // تسجيل الدخول عبر Firebase Auth
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;
            
            // ← جديد: التأكد من وجود بيانات المستخدم في Firestore
            // لو مش موجودة، هتتضاف تلقائياً
            await ensureUserDataInFirestore(user);
            
            // التوجيه للصفحة الرئيسية
            window.location.href = "index.html";
            
        } catch (err) {
            console.error("❌ Login error:", err.code);
            
            // رسائل خطأ مخصصة حسب نوع الخطأ
            switch (err.code) {
                case 'auth/invalid-credential':
                case 'auth/user-not-found':
                case 'auth/wrong-password':
                    loginError.textContent = 'Invalid email or password.';
                    break;
                case 'auth/invalid-email':
                    loginError.textContent = 'Please enter a valid email address.';
                    break;
                case 'auth/user-disabled':
                    loginError.textContent = 'This account has been disabled.';
                    break;
                case 'auth/too-many-requests':
                    loginError.textContent = 'Too many attempts. Please try again later.';
                    break;
                default:
                    loginError.textContent = 'Login failed. Please try again.';
            }
        }
    });

    // ========== معالجة إنشاء الحساب ==========
    document.getElementById('btn-signup').addEventListener('click', async () => {
        const displayName = document.getElementById('signup-displayname').value.trim();
        const username    = document.getElementById('signup-username').value.trim().toLowerCase();
        const email       = document.getElementById('signup-email').value.trim();
        const password    = document.getElementById('signup-password').value;

        signupError.textContent = '';

        // التحقق من الحقول الفارغة
        if (!displayName || !username || !email || !password) {
            signupError.textContent = 'Please fill in all fields.';
            return;
        }

        // التحقق من صحة البريد الإلكتروني
        if (!isValidEmail(email)) {
            signupError.textContent = 'Please enter a valid email address.';
            return;
        }

        // التحقق من طول كلمة المرور
        if (password.length < 6) {
            signupError.textContent = 'Password must be at least 6 characters.';
            return;
        }

        // التحقق من طول اسم المستخدم
        if (username.length < 3) {
            signupError.textContent = 'Username must be at least 3 characters.';
            return;
        }

        try {
            // 1. إنشاء الحساب في Firebase Auth
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            // 2. تحديث البروفايل في Firebase Auth (إضافة اسم العرض)
            await updateProfile(user, {
                displayName: displayName
            });

            // 3. إنشاء بيانات المستخدم في Firestore
            await createUserData(user, {
                username: username,
                displayName: displayName
            });

            console.log("✅ تم إنشاء الحساب بنجاح:", {
                uid: user.uid,
                email: email,
                username: username,
                displayName: displayName
            });

            // 4. التوجيه إلى الصفحة الرئيسية
            window.location.href = "index.html";

        } catch (err) {
            console.error("❌ Signup error:", err.code);
            
            // رسائل خطأ مخصصة حسب نوع الخطأ
            switch (err.code) {
                case 'auth/email-already-in-use':
                    signupError.textContent = 'This email is already registered.';
                    break;
                case 'auth/invalid-email':
                    signupError.textContent = 'Please enter a valid email address.';
                    break;
                case 'auth/weak-password':
                    signupError.textContent = 'Password should be at least 6 characters.';
                    break;
                case 'auth/operation-not-allowed':
                    signupError.textContent = 'Registration is currently disabled.';
                    break;
                default:
                    signupError.textContent = 'Registration failed. Please try again.';
            }
        }
    });

    // ========== تفعيل زر Enter للإرسال ==========
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            if (loginForm.style.display !== 'none') {
                document.getElementById('btn-login').click();
            } else if (signupForm.style.display !== 'none') {
                document.getElementById('btn-signup').click();
            }
        }
    });
</script>
</body>
</html>
