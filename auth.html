<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaChat — Auth</title>
    
    <!-- Iconify -->
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    
    <style>
        /* ========== إعادة تعيين وتنسيقات أساسية ========== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0F172A;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ========== حاوية الصفحة ========== */
        .page {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ========== الكارد الأساسي ========== */
        .card {
            background: #1E293B;
            border-radius: 24px;
            padding: 40px 36px;
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(124, 58, 237, 0.3);
            max-height: 90vh;
            overflow-y: auto;
        }

        /* تنسيق شريط التمرير */
        .card::-webkit-scrollbar {
            width: 6px;
        }

        .card::-webkit-scrollbar-track {
            background: transparent;
        }

        .card::-webkit-scrollbar-thumb {
            background: rgba(124, 58, 237, 0.3);
            border-radius: 3px;
        }

        /* ========== الأيقونة الدائرية العلوية ========== */
        .avatar-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7C3AED, #1F2937);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 8px;
            color: #ffffff;
            flex-shrink: 0;
        }

        /* ========== العنوان ========== */
        h2 {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 4px;
        }

        /* ========== حقل الإدخال ========== */
        .field {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1F2937;
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid rgba(124, 58, 237, 0.35);
            transition: border-color 0.2s;
        }

        .field:focus-within {
            border-color: #7C3AED;
        }

        .field iconify-icon {
            font-size: 20px;
            color: #9D5CF6;
            flex-shrink: 0;
        }

        .field input,
        .field select {
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 15px;
            width: 100%;
        }

        .field input::placeholder {
            color: #6b7280;
        }

        .field select {
            cursor: pointer;
        }

        .field select option {
            background: #1E293B;
            color: #ffffff;
        }

        /* ========== حقول الصف الواحد (الجنس + العمر) ========== */
        .row-fields {
            width: 100%;
            display: flex;
            gap: 12px;
        }

        .row-fields .field {
            flex: 1;
        }

        /* ========== مؤشر التحقق من اسم المستخدم ========== */
        .username-status {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            min-height: 18px;
            padding: 0 4px;
        }

        .username-status.available {
            color: #34D399;
        }

        .username-status.taken {
            color: #F87171;
        }

        .username-status.checking {
            color: #9CA3AF;
        }

        /* ========== رابط نسيت كلمة المرور ========== */
        .forgot {
            width: 100%;
            text-align: right;
            margin-top: -8px;
        }

        .forgot a {
            color: #9D5CF6;
            font-size: 13px;
            text-decoration: none;
        }

        .forgot a:hover {
            color: #C4B5FD;
        }

        /* ========== الأزرار ========== */
        button {
            width: 100%;
            padding: 14px;
            background: #7C3AED;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover:not(:disabled) {
            background: #5B21B6;
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ========== نص التبديل بين النماذج ========== */
        .switch {
            font-size: 13px;
            color: #9CA3AF;
        }

        .switch span {
            color: #9D5CF6;
            cursor: pointer;
            font-weight: 600;
        }

        .switch span:hover {
            text-decoration: underline;
            color: #C4B5FD;
        }

        /* ========== رسائل الخطأ ========== */
        .error {
            width: 100%;
            color: #f87171;
            font-size: 13px;
            min-height: 16px;
            text-align: center;
        }

        /* ========== تنسيقات Responsive ========== */
        @media (max-width: 400px) {
            .card {
                padding: 30px 20px;
            }
            
            .row-fields {
                flex-direction: column;
                gap: 12px;
            }
        }
    </style>
</head>
<body>

<div class="page">

    <!-- ========== كارد تسجيل الدخول ========== -->
    <div class="card" id="login-form">
        <div class="avatar-icon">
            <iconify-icon icon="mdi:account-circle" style="font-size: 50px;"></iconify-icon>
        </div>
        <h2>Login</h2>

        <div class="field">
            <iconify-icon icon="mdi:email-outline"></iconify-icon>
            <input type="email" id="login-email" placeholder="jane.doe@example.com" autocomplete="email">
        </div>

        <div class="field">
            <iconify-icon icon="mdi:lock-outline"></iconify-icon>
            <input type="password" id="login-password" placeholder="••••••" autocomplete="current-password">
        </div>

        <p class="error" id="login-error"></p>

        <div class="forgot">
            <a href="#">Forgot password?</a>
        </div>

        <button id="btn-login">Log in</button>

        <p class="switch">Don't have an account? <span id="go-signup">Sign Up</span></p>
    </div>

    <!-- ========== كارد إنشاء الحساب (مخفي افتراضياً) ========== -->
    <div class="card" id="signup-form" style="display:none">
        <div class="avatar-icon">
            <iconify-icon icon="mdi:account-plus" style="font-size: 50px;"></iconify-icon>
        </div>
        <h2>Create Account</h2>

        <!-- اسم العرض -->
        <div class="field">
            <iconify-icon icon="mdi:card-account-details-outline"></iconify-icon>
            <input type="text" id="signup-displayname" placeholder="Display Name" maxlength="30">
        </div>

        <!-- اسم المستخدم -->
        <div class="field">
            <iconify-icon icon="mdi:account-outline"></iconify-icon>
            <input type="text" id="signup-username" placeholder="Username" maxlength="20" autocomplete="off">
        </div>
        
        <!-- حالة اسم المستخدم (متاح/محجوز) -->
        <div class="username-status" id="username-status"></div>

        <!-- الجنس + العمر في صف واحد -->
        <div class="row-fields">
            <!-- اختيار الجنس -->
            <div class="field">
                <iconify-icon icon="mdi:gender-male-female"></iconify-icon>
                <select id="signup-gender">
                    <option value="">Gender</option>
                    <option value="male">♂ Male</option>
                    <option value="female">♀ Female</option>
                </select>
            </div>

            <!-- إدخال العمر -->
            <div class="field">
                <iconify-icon icon="mdi:cake-variant-outline"></iconify-icon>
                <input type="number" id="signup-age" placeholder="Age" min="15" max="120">
            </div>
        </div>

        <!-- البريد الإلكتروني -->
        <div class="field">
            <iconify-icon icon="mdi:email-outline"></iconify-icon>
            <input type="email" id="signup-email" placeholder="Email" autocomplete="email">
        </div>

        <!-- كلمة المرور -->
        <div class="field">
            <iconify-icon icon="mdi:lock-outline"></iconify-icon>
            <input type="password" id="signup-password" placeholder="Password" autocomplete="new-password">
        </div>

        <p class="error" id="signup-error"></p>

        <button id="btn-signup">Create Account</button>

        <p class="switch">Already have an account? <span id="go-login">Log In</span></p>
    </div>

</div>

<script type="module">
    // ========== استيراد Firebase ==========
    import { auth, db } from "./firebase-config.js";

    import {
        createUserWithEmailAndPassword,
        signInWithEmailAndPassword,
        onAuthStateChanged,
        updateProfile
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    import {
        doc, 
        setDoc, 
        getDoc,
        serverTimestamp,
        updateDoc,
        collection,
        query,
        where,
        getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ========== التحقق التلقائي عند فتح الصفحة ==========
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            await ensureUserDataInFirestore(user);
            window.location.href = "index.html";
        }
    });

    // ========== عناصر DOM ==========
    const loginForm   = document.getElementById('login-form');
    const signupForm  = document.getElementById('signup-form');
    const loginError  = document.getElementById('login-error');
    const signupError = document.getElementById('signup-error');
    const usernameStatus = document.getElementById('username-status');
    const signupUsername = document.getElementById('signup-username');
    const btnSignup = document.getElementById('btn-signup');

    // ========== متغيرات للتحكم في التحقق من اسم المستخدم ==========
    let usernameCheckTimeout;
    let isUsernameAvailable = false;

    // ========== التبديل بين الفورمين ==========
    document.getElementById('go-signup').addEventListener('click', () => {
        loginForm.style.display  = 'none';
        signupForm.style.display = 'flex';
        loginError.textContent   = '';
        signupError.textContent  = '';
        resetSignupForm();
    });

    document.getElementById('go-login').addEventListener('click', () => {
        signupForm.style.display = 'none';
        loginForm.style.display  = 'flex';
        loginError.textContent   = '';
        signupError.textContent  = '';
        resetSignupForm();
    });

    // ========== دالة إعادة تعيين نموذج التسجيل ==========
    function resetSignupForm() {
        document.getElementById('signup-displayname').value = '';
        signupUsername.value = '';
        document.getElementById('signup-gender').value = '';
        document.getElementById('signup-age').value = '';
        document.getElementById('signup-email').value = '';
        document.getElementById('signup-password').value = '';
        usernameStatus.textContent = '';
        usernameStatus.className = 'username-status';
        isUsernameAvailable = false;
        updateSignupButton();
    }

    // ========== دالة التحقق من صحة البريد الإلكتروني ==========
    function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    /**
     * ========== التحقق من توفر اسم المستخدم في Firestore ==========
     * 
     * شرح الدالة:
     * - بتتعمل تلقائياً بعد ما المستخدم يكتب اسم مستخدم
     * - بتستنى 500ms عشان متعملش طلبات كتير (debounce)
     * - بتبحث في Firestore لو اسم المستخدم ده مستخدم قبل كده
     * - بتعرض رسالة للمستخدم (متاح ✅ / محجوز ❌)
     */
    async function checkUsernameAvailability(username) {
        // لو فاضي، منظهرش حاجة
        if (!username || username.trim().length < 3) {
            usernameStatus.textContent = '';
            usernameStatus.className = 'username-status';
            isUsernameAvailable = false;
            updateSignupButton();
            return;
        }

        // عرض حالة البحث
        usernameStatus.textContent = '🔄 Checking availability...';
        usernameStatus.className = 'username-status checking';
        isUsernameAvailable = false;
        updateSignupButton();

        try {
            // البحث في Firestore عن اسم المستخدم
            const usersRef = collection(db, "users");
            const q = query(usersRef, where("username", "==", username.toLowerCase()));
            const querySnapshot = await getDocs(q);

            if (querySnapshot.empty) {
                // اسم المستخدم متاح
                usernameStatus.innerHTML = '<iconify-icon icon="mdi:check-circle" style="font-size:16px;"></iconify-icon> Username is available!';
                usernameStatus.className = 'username-status available';
                isUsernameAvailable = true;
            } else {
                // اسم المستخدم محجوز
                usernameStatus.innerHTML = '<iconify-icon icon="mdi:close-circle" style="font-size:16px;"></iconify-icon> Username is already taken';
                usernameStatus.className = 'username-status taken';
                isUsernameAvailable = false;
            }
        } catch (error) {
            console.error("❌ خطأ في التحقق من اسم المستخدم:", error);
            usernameStatus.textContent = '⚠️ Could not verify username';
            usernameStatus.className = 'username-status taken';
            isUsernameAvailable = false;
        }
        
        updateSignupButton();
    }

    // ========== حدث كتابة اسم المستخدم (مع debounce) ==========
    signupUsername.addEventListener('input', (e) => {
        // السماح بالأحرف الإنجليزية والأرقام والشرطة السفلية فقط
        const filteredValue = e.target.value.replace(/[^a-zA-Z0-9_]/g, '');
        e.target.value = filteredValue;

        // إلغاء المؤقت السابق
        clearTimeout(usernameCheckTimeout);
        
        // تعيين مؤقت جديد (500ms delay)
        usernameCheckTimeout = setTimeout(() => {
            checkUsernameAvailability(filteredValue);
        }, 500);
    });

    // ========== دالة تحديث حالة زر التسجيل ==========
    function updateSignupButton() {
        const displayName = document.getElementById('signup-displayname').value.trim();
        const username = signupUsername.value.trim();
        const gender = document.getElementById('signup-gender').value;
        const age = document.getElementById('signup-age').value;
        const email = document.getElementById('signup-email').value.trim();
        const password = document.getElementById('signup-password').value;

        const isValid = displayName && 
                       username.length >= 3 && 
                       isUsernameAvailable && 
                       gender && 
                       age >= 15 && 
                       isValidEmail(email) && 
                       password.length >= 6;

        btnSignup.disabled = !isValid;
    }

    // ========== مراقبة جميع حقول التسجيل ==========
    ['signup-displayname', 'signup-gender', 'signup-age', 'signup-email', 'signup-password'].forEach(id => {
        document.getElementById(id).addEventListener('input', updateSignupButton);
    });

    // ========== التأكد من وجود بيانات المستخدم في Firestore ==========
    async function ensureUserDataInFirestore(user) {
        try {
            const userRef = doc(db, "users", user.uid);
            const userSnap = await getDoc(userRef);

            if (!userSnap.exists()) {
                console.log("⚠️ بيانات المستخدم مش موجودة. جاري إضافتها...");
                
                const usernameFromEmail = user.email ? user.email.split('@')[0] : 'user';
                
                await setDoc(userRef, {
                    uid:            user.uid,
                    email:          user.email || '',
                    username:       usernameFromEmail.toLowerCase(),
                    displayName:    user.displayName || usernameFromEmail,
                    photoURL:       user.photoURL || '',
                    gender:         'male',  // ← جديد
                    age:            18,       // ← جديد (قيمة افتراضية)
                    theme:          "dark",
                    bio:            "",
                    status:         "online",
                    createdAt:      serverTimestamp(),
                    lastLogin:      serverTimestamp(),
                    searchKeywords: [
                        usernameFromEmail.toLowerCase(), 
                        (user.displayName || usernameFromEmail).toLowerCase()
                    ]
                });
                
                console.log("✅ تم إضافة بيانات المستخدم بنجاح");
            } else {
                await updateDoc(userRef, {
                    lastLogin: serverTimestamp(),
                    status: "online"
                });
            }
        } catch (error) {
            console.error("❌ خطأ في التأكد من بيانات المستخدم:", error);
        }
    }

    /**
     * ========== دالة إنشاء بيانات المستخدم الكاملة ==========
     * 
     * @param {object} user - كائن المستخدم من Firebase Auth
     * @param {object} extraData - بيانات إضافية (username, displayName, gender, age)
     */
    async function createUserData(user, extraData = {}) {
        const userRef = doc(db, "users", user.uid);
        
        const userData = {
            uid:            user.uid,
            email:          user.email || '',
            username:       extraData.username || user.email.split('@')[0].toLowerCase(),
            displayName:    extraData.displayName || user.displayName || user.email.split('@')[0],
            photoURL:       user.photoURL || '',
            gender:         extraData.gender || 'male',      // ← جديد
            age:            parseInt(extraData.age) || 18,    // ← جديد
            theme:          "dark",
            bio:            "",
            status:         "online",
            createdAt:      serverTimestamp(),
            lastLogin:      serverTimestamp(),
            searchKeywords: [
                (extraData.username || user.email.split('@')[0]).toLowerCase(),
                (extraData.displayName || user.displayName || user.email.split('@')[0]).toLowerCase()
            ]
        };

        await setDoc(userRef, userData);
        console.log("✅ تم إنشاء بيانات المستخدم:", userData);
        return userData;
    }

    // ========== معالجة تسجيل الدخول ==========
    document.getElementById('btn-login').addEventListener('click', async () => {
        const email    = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;

        loginError.textContent = '';

        if (!email || !password) {
            loginError.textContent = 'Please fill in all fields.';
            return;
        }

        if (!isValidEmail(email)) {
            loginError.textContent = 'Please enter a valid email address.';
            return;
        }

        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;
            
            await ensureUserDataInFirestore(user);
            window.location.href = "index.html";
            
        } catch (err) {
            console.error("❌ Login error:", err.code);
            
            switch (err.code) {
                case 'auth/invalid-credential':
                case 'auth/user-not-found':
                case 'auth/wrong-password':
                    loginError.textContent = 'Invalid email or password.';
                    break;
                case 'auth/invalid-email':
                    loginError.textContent = 'Please enter a valid email address.';
                    break;
                case 'auth/user-disabled':
                    loginError.textContent = 'This account has been disabled.';
                    break;
                case 'auth/too-many-requests':
                    loginError.textContent = 'Too many attempts. Please try again later.';
                    break;
                default:
                    loginError.textContent = 'Login failed. Please try again.';
            }
        }
    });

    // ========== معالجة إنشاء الحساب ==========
    btnSignup.addEventListener('click', async () => {
        const displayName = document.getElementById('signup-displayname').value.trim();
        const username    = signupUsername.value.trim().toLowerCase();
        const gender      = document.getElementById('signup-gender').value;
        const age         = parseInt(document.getElementById('signup-age').value);
        const email       = document.getElementById('signup-email').value.trim();
        const password    = document.getElementById('signup-password').value;

        signupError.textContent = '';

        // التحقق من الحقول الفارغة
        if (!displayName || !username || !gender || !age || !email || !password) {
            signupError.textContent = 'Please fill in all fields.';
            return;
        }

        // التحقق من اسم المستخدم
        if (username.length < 3) {
            signupError.textContent = 'Username must be at least 3 characters.';
            return;
        }

        if (!isUsernameAvailable) {
            signupError.textContent = 'Please choose an available username.';
            return;
        }

        // التحقق من العمر
        if (age < 15) {
            signupError.textContent = 'You must be at least 15 years old to register.';
            return;
        }

        if (age > 120) {
            signupError.textContent = 'Please enter a valid age.';
            return;
        }

        // التحقق من صحة البريد الإلكتروني
        if (!isValidEmail(email)) {
            signupError.textContent = 'Please enter a valid email address.';
            return;
        }

        // التحقق من طول كلمة المرور
        if (password.length < 6) {
            signupError.textContent = 'Password must be at least 6 characters.';
            return;
        }

        try {
            // 1. إنشاء الحساب في Firebase Auth
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            // 2. تحديث البروفايل في Firebase Auth
            await updateProfile(user, {
                displayName: displayName
            });

            // 3. إنشاء بيانات المستخدم في Firestore
            await createUserData(user, {
                username: username,
                displayName: displayName,
                gender: gender,      // ← جديد
                age: age             // ← جديد
            });

            console.log("✅ تم إنشاء الحساب بنجاح:", {
                uid: user.uid,
                email: email,
                username: username,
                displayName: displayName,
                gender: gender,
                age: age
            });

            // 4. التوجيه إلى الصفحة الرئيسية
            window.location.href = "index.html";

        } catch (err) {
            console.error("❌ Signup error:", err.code);
            
            switch (err.code) {
                case 'auth/email-already-in-use':
                    signupError.textContent = 'This email is already registered.';
                    break;
                case 'auth/invalid-email':
                    signupError.textContent = 'Please enter a valid email address.';
                    break;
                case 'auth/weak-password':
                    signupError.textContent = 'Password should be at least 6 characters.';
                    break;
                case 'auth/operation-not-allowed':
                    signupError.textContent = 'Registration is currently disabled.';
                    break;
                default:
                    signupError.textContent = 'Registration failed. Please try again.';
            }
        }
    });

    // ========== تفعيل زر Enter للإرسال ==========
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            if (loginForm.style.display !== 'none') {
                document.getElementById('btn-login').click();
            } else if (signupForm.style.display !== 'none' && !btnSignup.disabled) {
                btnSignup.click();
            }
        }
    });
</script>

</body>
</html>
