<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>NovaChat</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    
    <style>
        :root {
            --bg-primary: #0F172A;
            --bg-secondary: #1E293B;
            --bg-tertiary: #0F172A;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --border-color: rgba(124, 58, 237, 0.2);
            --border-input: rgba(124, 58, 237, 0.25);
            --accent: #9D5CF6;
            --accent-light: #7C3AED;
            --bubble-received: #1E293B;
            --hover-bg: rgba(124, 58, 237, 0.1);
            --active-bg: rgba(124, 58, 237, 0.2);
            --online-color: #34D399;
            --danger: #F87171;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            --popup-bg: rgba(0, 0, 0, 0.7);
            --glass-bg: rgba(30, 41, 59, 0.8);
            --glass-border: rgba(124, 58, 237, 0.2);
        }

        body.light-theme {
            --bg-primary: #F8FAFC;
            --bg-secondary: #FFFFFF;
            --bg-tertiary: #F1F5F9;
            --text-primary: #1E293B;
            --text-secondary: #64748B;
            --text-muted: #94A3B8;
            --border-color: rgba(124, 58, 237, 0.15);
            --border-input: rgba(124, 58, 237, 0.2);
            --bubble-received: #F1F5F9;
            --hover-bg: rgba(124, 58, 237, 0.05);
            --active-bg: rgba(124, 58, 237, 0.1);
            --popup-bg: rgba(0, 0, 0, 0.4);
            --shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(124, 58, 237, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        .app {
            display: flex;
            height: 100vh;
            height: 100dvh;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: 320px;
            min-width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
            z-index: 100;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-header {
            padding: 20px 16px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 16px;
        }

        .logo iconify-icon { font-size: 30px; }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-tertiary);
            border: 2px solid var(--border-input);
            border-radius: 14px;
            padding: 10px 14px;
            transition: all 0.3s;
        }

        .search-box:focus-within {
            border-color: var(--accent-light);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .search-box iconify-icon { color: var(--accent); font-size: 18px; }

        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 14px;
            width: 100%;
            font-family: 'Poppins', sans-serif;
        }

        .search-box input::placeholder { color: var(--text-muted); }

        .search-results {
            max-height: 250px;
            overflow-y: auto;
            border-bottom: 1px solid var(--border-color);
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 16px 16px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 8px;
        }

        .chat-list::-webkit-scrollbar,
        .search-results::-webkit-scrollbar { width: 5px; }

        .chat-list::-webkit-scrollbar-thumb,
        .search-results::-webkit-scrollbar-thumb {
            background: rgba(124, 58, 237, 0.3);
            border-radius: 10px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 2px;
            position: relative;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .chat-item:hover { background: var(--hover-bg); transform: translateX(2px); }
        .chat-item:active { transform: scale(0.98); }

        .chat-item.active {
            background: var(--active-bg);
            border: 1px solid rgba(124, 58, 237, 0.3);
        }

        .chat-item.pinned {
            border-left: 3px solid var(--accent-light);
        }

        .avatar {
            width: 46px;
            height: 46px;
            min-width: 46px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7C3AED, #5B21B6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            color: #fff;
            position: relative;
            transition: transform 0.3s;
        }

        .avatar:hover { transform: scale(1.05); }
        .avatar.sm { width: 38px; height: 38px; min-width: 38px; font-size: 15px; }

        .avatar.online::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: var(--online-color);
            border-radius: 50%;
            border: 2px solid var(--bg-secondary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.4); }
            50% { box-shadow: 0 0 0 6px rgba(52, 211, 153, 0); }
        }

        .chat-info { flex: 1; overflow: hidden; }

        .chat-info .name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-info .preview {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-info .typing {
            color: var(--accent-light);
            font-style: italic;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .unread-badge {
            background: var(--accent-light);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 12px;
            min-width: 22px;
            text-align: center;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        .pin-icon {
            color: var(--accent-light);
            font-size: 14px;
            margin-left: 4px;
        }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-tertiary);
        }

        .sidebar-footer .user-section {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
            cursor: pointer;
            padding: 4px;
            border-radius: 10px;
            transition: background 0.2s;
        }

        .sidebar-footer .user-section:hover { background: var(--hover-bg); }

        .sidebar-footer .user-details { flex: 1; min-width: 0; }

        .sidebar-footer .user-details .name {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-footer .user-details .status {
            font-size: 11px;
            color: var(--online-color);
            font-weight: 500;
        }

        .icon-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            width: 38px;
            height: 38px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 18px;
            position: relative;
        }

        .icon-btn:hover {
            background: var(--hover-bg);
            border-color: var(--accent-light);
            color: var(--accent);
            transform: translateY(-1px);
        }

        .icon-btn:active { transform: scale(0.95); }

        .icon-btn.danger:hover {
            background: rgba(248, 113, 113, 0.1);
            border-color: var(--danger);
            color: var(--danger);
        }

        /* ========== CHAT AREA ========== */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            min-width: 0;
            transition: background 0.3s;
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }

        .chat-header .avatar { cursor: pointer; }

        .chat-header-info { flex: 1; min-width: 0; }

        .chat-header-info .name {
            font-size: 16px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-header-info .status-text {
            font-size: 12px;
            font-weight: 500;
        }

        .chat-header-info .status-text.online { color: var(--online-color); }
        .chat-header-info .status-text.offline { color: var(--text-muted); }
        .chat-header-info .status-text.typing { color: var(--accent-light); }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            scroll-behavior: smooth;
        }

        .messages-area::-webkit-scrollbar { width: 5px; }
        .messages-area::-webkit-scrollbar-thumb {
            background: rgba(124, 58, 237, 0.2);
            border-radius: 10px;
        }

        .date-divider {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            padding: 16px 0 8px;
            font-weight: 500;
            animation: fadeIn 0.5s ease;
        }

        .msg {
            display: flex;
            flex-direction: column;
            max-width: 68%;
            animation: msgSlide 0.3s ease;
            position: relative;
            transition: all 0.3s;
        }

        @keyframes msgSlide {
            from { opacity: 0; transform: translateY(10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .msg.in { align-self: flex-start; }
        .msg.out { align-self: flex-end; }

        .msg-bubble {
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            font-weight: 400;
            transition: all 0.3s;
            position: relative;
        }

        .msg-bubble:hover { transform: translateY(-1px); }

        .msg.in .msg-bubble {
            background: var(--bubble-received);
            color: var(--text-primary);
            border-bottom-left-radius: 6px;
        }

        .msg.out .msg-bubble {
            background: linear-gradient(135deg, #7C3AED, #5B21B6);
            color: #fff;
            border-bottom-right-radius: 6px;
        }

        .msg-time {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
            padding: 0 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .msg.out .msg-time { justify-content: flex-end; }

        .msg-status {
            font-size: 12px;
        }

        .msg-status.sent { color: var(--text-muted); }
        .msg-status.delivered { color: var(--text-muted); }
        .msg-status.seen { color: var(--accent-light); }

        .msg-reactions {
            display: flex;
            gap: 4px;
            margin-top: 4px;
            padding: 2px 8px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-size: 16px;
            animation: popIn 0.3s ease;
            cursor: pointer;
        }

        .msg-reactions span {
            cursor: pointer;
            transition: transform 0.2s;
        }

        .msg-reactions span:hover { transform: scale(1.3); }

        .msg-actions {
            display: none;
            position: absolute;
            top: -30px;
            right: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 4px;
            gap: 4px;
            z-index: 10;
        }

        .msg:hover .msg-actions {
            display: flex;
        }

        .msg-action-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s;
        }

        .msg-action-btn:hover {
            background: var(--hover-bg);
            color: var(--accent-light);
        }

        .msg-action-btn.danger:hover { color: var(--danger); }

        .msg-edited {
            font-size: 10px;
            color: var(--text-muted);
            font-style: italic;
            margin-top: 2px;
        }

        .input-area {
            padding: 14px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            background: var(--bg-tertiary);
            border: 2px solid var(--border-input);
            border-radius: 24px;
            padding: 12px 18px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
        }

        .input-area input:focus {
            border-color: var(--accent-light);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .input-area input::placeholder { color: var(--text-muted); }

        .send-btn {
            width: 46px;
            height: 46px;
            min-width: 46px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7C3AED, #5B21B6);
            border: none;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .send-btn:hover {
            transform: scale(1.1) translateY(-2px);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.5);
        }

        .send-btn:active { transform: scale(0.9); }

        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            text-align: center;
            padding: 30px;
            animation: fadeIn 0.5s ease;
        }

        .welcome iconify-icon { font-size: 80px; opacity: 0.25; color: var(--accent); }
        .welcome h2 { font-size: 24px; font-weight: 700; color: var(--text-primary); }
        .welcome p { font-size: 14px; color: var(--text-secondary); max-width: 320px; font-weight: 400; }

        /* ========== MODALS (Glassmorphism) ========== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--popup-bg);
            z-index: 300;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
            animation: fadeIn 0.3s ease;
        }

        .modal-overlay.show { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px 28px;
            width: 92%;
            max-width: 420px;
            text-align: center;
            animation: modalSlide 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes modalSlide {
            from { opacity: 0; transform: scale(0.8) translateY(40px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal .modal-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7C3AED, #5B21B6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            color: #fff;
            margin: 0 auto 16px;
            border: 4px solid var(--accent-light);
        }

        .modal h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 2px;
            color: var(--text-primary);
        }

        .modal .uname {
            font-size: 14px;
            color: var(--accent);
            margin-bottom: 16px;
            font-weight: 500;
        }

        .modal .info-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 0;
            border-top: 1px solid var(--border-color);
            text-align: left;
            font-size: 13px;
        }

        .modal .info-row iconify-icon {
            font-size: 18px;
            color: var(--accent-light);
            margin-top: 2px;
        }

        .modal .info-row .lbl {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal .info-row .val {
            color: var(--text-secondary);
            font-weight: 400;
            font-size: 13px;
        }

        .modal .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }

        .modal .btn {
            flex: 1;
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            transition: all 0.2s;
            border: 1px solid var(--border-color);
        }

        .modal .btn-close {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        .modal .btn-close:hover { background: var(--active-bg); }

        .modal .btn-primary {
            background: linear-gradient(135deg, #7C3AED, #5B21B6);
            color: #fff;
            border: none;
        }

        .modal .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .modal .btn-primary:active { transform: scale(0.98); }

        .modal .edit-input, .modal .edit-textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border: 2px solid var(--border-input);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            outline: none;
            margin-top: 4px;
            transition: border-color 0.3s;
        }

        .modal .edit-input:focus, .modal .edit-textarea:focus {
            border-color: var(--accent-light);
        }

        .modal .edit-textarea {
            resize: vertical;
            min-height: 60px;
        }

        /* Reaction picker */
        .reaction-picker {
            display: flex;
            gap: 8px;
            justify-content: center;
            padding: 8px;
        }

        .reaction-picker span {
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
            padding: 4px;
        }

        .reaction-picker span:hover {
            transform: scale(1.4);
        }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--hover-bg) 50%, var(--bg-tertiary) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .skeleton-avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
        }

        .skeleton-text {
            height: 14px;
            margin: 4px 0;
        }

        .skeleton-text.short { width: 60%; }
        .skeleton-text.long { width: 80%; }

        /* ========== MOBILE ========== */
        .menu-btn {
            display: none;
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 50;
            background: var(--accent-light);
            border: none;
            color: #fff;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
        }

        .back-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 24px;
            cursor: pointer;
            padding: 6px;
            margin-right: 4px;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
            backdrop-filter: blur(3px);
        }

        .sidebar-overlay.show { display: block; }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                width: 85%;
                max-width: 340px;
                transform: translateX(-100%);
                z-index: 100;
            }
            .sidebar.open { transform: translateX(0); }
            .menu-btn { display: flex; }
            .back-btn { display: block; }
            .msg { max-width: 85%; }
            .msg-actions { display: flex !important; position: static; margin-top: 4px; }
        }

        @media (max-width: 480px) {
            .msg { max-width: 90%; }
            .msg-bubble { font-size: 13px; padding: 8px 12px; }
            .modal { padding: 20px 16px; }
        }

        @media (min-width: 769px) {
            .menu-btn, .sidebar-overlay, .back-btn { display: none; }
        }
    </style>
</head>

<div class="app">

    <!-- MAIN CHAT -->
    <main class="chat-main">

<script type="module">
    import { auth, db } from "./firebase-config.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { 
        collection, doc, getDoc, getDocs, setDoc, addDoc, 
        query, where, orderBy, onSnapshot, serverTimestamp,
        updateDoc, deleteDoc, increment, Timestamp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ===== STATE =====
    let currentUser = null;
    let currentUserData = null;
    let activeChatId = null;
    let activeChatUser = null;
    let messagesUnsub = null;
    let convsUnsub = null;
    let usersCache = [];
    let typingTimeout = null;
    let lastMessageTime = 0;
    const SPAM_COOLDOWN = 1000; // 1 second cooldown
    const EDIT_WINDOW = 15 * 60 * 1000; // 15 minutes
    let editingMessageId = null;

    // ===== DOM =====
    const $ = (id) => document.getElementById(id);
    const sidebar = $('sidebar');
    const overlay = $('sidebar-overlay');
    const welcomeScreen = $('welcome-screen');
    const chatScreen = $('chat-screen');
    const searchInput = $('search-input');
    const searchResults = $('search-results');
    const conversationsList = $('conversations-list');
    const messagesArea = $('messages-area');
    const messageInput = $('message-input');
    const userModal = $('user-modal');
    const editModal = $('edit-modal');
    const editMsgModal = $('edit-msg-modal');

    // ===== THEME =====
    const savedTheme = localStorage.getItem('nova-theme') || 'dark';
    if (savedTheme === 'light') document.body.classList.add('light-theme');
    
    $('theme-btn').addEventListener('click', () => {
        document.body.classList.toggle('light-theme');
        localStorage.setItem('nova-theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
    });

    // ===== MOBILE MENU =====
    $('menu-btn').addEventListener('click', () => { sidebar.classList.add('open'); overlay.classList.add('show'); });
    overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('show'); });
    $('back-btn').addEventListener('click', closeChat);

    // ===== MODALS =====
    function showModal(modal) { modal.classList.add('show'); }
    function hideModal(modal) { modal.classList.remove('show'); }
    
    userModal.addEventListener('click', (e) => { if (e.target === userModal) hideModal(userModal); });
    editModal.addEventListener('click', (e) => { if (e.target === editModal) hideModal(editModal); });
    editMsgModal.addEventListener('click', (e) => { if (e.target === editMsgModal) hideModal(editMsgModal); });

    // ===== AUTH =====
    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "auth.html"; return; }
        currentUser = user;
        
        const userRef = doc(db, "users", user.uid);
        const snap = await getDoc(userRef);
        
        if (snap.exists()) {
            currentUserData = snap.data();
        } else {
            currentUserData = {
                uid: user.uid,
                email: user.email || '',
                displayName: user.displayName || user.email?.split('@')[0] || 'User',
                username: (user.displayName || user.email?.split('@')[0] || 'user').toLowerCase().replace(/\s+/g, ''),
                photoURL: "", bio: "", status: "online",
                createdAt: serverTimestamp(),
                lastLogin: serverTimestamp(),
                searchKeywords: [], contacts: [],
                pinnedChats: []
            };
            currentUserData.searchKeywords = [currentUserData.username, currentUserData.displayName.toLowerCase()];
            await setDoc(userRef, currentUserData);
        }

        await updateDoc(userRef, { status: "online", lastLogin: serverTimestamp() });
        updateSelfUI();
        await cacheUsers();
        listenToConversations();
        
        // Browser notifications permission
        if (Notification.permission === 'default') {
            Notification.requestPermission();
        }
    });

    function updateSelfUI() {
        $('self-name').textContent = currentUserData.displayName;
        $('self-avatar').textContent = currentUserData.displayName.charAt(0).toUpperCase();
        $('edit-avatar').textContent = currentUserData.displayName.charAt(0).toUpperCase();
    }

    async function cacheUsers() {
        const snap = await getDocs(collection(db, "users"));
        usersCache = [];
        snap.forEach(d => {
            if (d.data().uid !== currentUser?.uid) usersCache.push(d.data());
        });
        updateOnlineCount();
    }

    function updateOnlineCount() {
        const count = usersCache.filter(u => u.status === 'online').length;
        $('online-count').textContent = count > 0 ? `${count} online` : '';
    }

    // ===== CONVERSATIONS =====
    function listenToConversations() {
        if (convsUnsub) convsUnsub();

        const q = query(
            collection(db, "conversations"),
            where("participants", "array-contains", currentUser.uid)
        );

        convsUnsub = onSnapshot(q, async (snapshot) => {
            const docs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            
            // Separate pinned and unpinned
            const pinned = docs.filter(d => currentUserData.pinnedChats?.includes(d.id));
            const unpinned = docs.filter(d => !currentUserData.pinnedChats?.includes(d.id));
            
            // Sort each group by time
            const sortFn = (a, b) => {
                const timeA = a.updatedAt?.toDate?.() || new Date(0);
                const timeB = b.updatedAt?.toDate?.() || new Date(0);
                return timeB - timeA;
            };
            pinned.sort(sortFn);
            unpinned.sort(sortFn);
            
            const sorted = [...pinned, ...unpinned];
            
            conversationsList.innerHTML = '';

            if (sorted.length === 0) {
                conversationsList.innerHTML = `
                    <div style="padding:24px;text-align:center;color:var(--text-muted);font-size:13px;">
                        <iconify-icon icon="mdi:message-text-outline" style="font-size:36px;opacity:0.3;display:block;margin:0 auto 8px;"></iconify-icon>
                        No conversations yet
                    </div>`;
                return;
            }

            for (const conv of sorted) {
                const otherId = conv.participants.find(id => id !== currentUser.uid);
                if (!otherId) continue;

                let otherUser = usersCache.find(u => u.uid === otherId);
                if (!otherUser) {
                    const snap = await getDoc(doc(db, "users", otherId));
                    if (snap.exists()) { otherUser = snap.data(); usersCache.push(otherUser); }
                    else continue;
                }

                const item = document.createElement('div');
                item.className = 'chat-item';
                if (conv.id === activeChatId) item.classList.add('active');
                if (currentUserData.pinnedChats?.includes(conv.id)) item.classList.add('pinned');
                item.dataset.convId = conv.id;

                const lastMsg = conv.lastMessage || 'Start chatting...';
                const truncated = lastMsg.length > 25 ? lastMsg.substring(0, 25) + '...' : lastMsg;
                const isOnline = otherUser.status === 'online';
                
                // Count unread (simplified)
                const unreadCount = (conv.lastMessageSender && conv.lastMessageSender !== currentUser.uid && conv.id !== activeChatId) ? 1 : 0;

                item.innerHTML = `
                    <div class="avatar sm ${isOnline ? 'online' : ''}">${otherUser.displayName.charAt(0).toUpperCase()}</div>
                    <div class="chat-info">
                        <div class="name">
                            ${currentUserData.pinnedChats?.includes(conv.id) ? '<iconify-icon icon="mdi:pin" class="pin-icon"></iconify-icon> ' : ''}
                            ${otherUser.displayName}
                        </div>
                        <div class="preview">${conv.typing?.[otherId] ? `<span class="typing">typing...</span>` : truncated}</div>
                    </div>
                    ${unreadCount > 0 ? `<div class="unread-badge">${unreadCount}</div>` : ''}
                `;

                item.addEventListener('click', () => {
                    openChat(conv.id, otherUser);
                    if (window.innerWidth <= 768) {
                        sidebar.classList.remove('open');
                        overlay.classList.remove('show');
                    }
                });

                // Swipe to delete (mobile)
                let touchStartX = 0;
                item.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
                item.addEventListener('touchend', async (e) => {
                    const diff = e.changedTouches[0].clientX - touchStartX;
                    if (diff > 80 && window.innerWidth <= 768) {
                        if (confirm('Delete this conversation?')) {
                            await deleteDoc(doc(db, "conversations", conv.id));
                        }
                    }
                });

                // Right click context menu
                item.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    if (confirm(currentUserData.pinnedChats?.includes(conv.id) ? 'Unpin this chat?' : 'Pin this chat?')) {
                        togglePinChat(conv.id);
                    }
                });

                conversationsList.appendChild(item);
            }
        });
    }

    // ===== PIN CHAT =====
    async function togglePinChat(convId) {
        const pinned = currentUserData.pinnedChats || [];
        const index = pinned.indexOf(convId);
        
        if (index > -1) {
            pinned.splice(index, 1);
        } else {
            pinned.unshift(convId);
        }
        
        await updateDoc(doc(db, "users", currentUser.uid), { pinnedChats: pinned });
        currentUserData.pinnedChats = pinned;
    }

    $('pin-chat-btn').addEventListener('click', async () => {
        if (activeChatId) {
            await togglePinChat(activeChatId);
            alert(currentUserData.pinnedChats?.includes(activeChatId) ? 'Chat pinned!' : 'Chat unpinned!');
        }
    });

    // ===== SEARCH =====
    searchInput.addEventListener('input', () => {
        const term = searchInput.value.trim().toLowerCase();
        searchResults.innerHTML = '';
        if (term.length < 2) return;

        const filtered = usersCache.filter(u => 
            u.searchKeywords && u.searchKeywords.some(k => k.includes(term))
        ).slice(0, 6);

        if (filtered.length === 0) {
            searchResults.innerHTML = '<div style="padding:14px;text-align:center;color:var(--text-muted);font-size:13px;">No users found</div>';
            return;
        }

        filtered.forEach(u => {
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.innerHTML = `
                <div class="avatar sm">${u.displayName.charAt(0).toUpperCase()}</div>
                <div class="chat-info">
                    <div class="name">${u.displayName}</div>
                    <div class="preview">@${u.username}</div>
                </div>
            `;
            div.addEventListener('click', async () => {
                searchInput.value = '';
                searchResults.innerHTML = '';
                await startChat(u);
                if (window.innerWidth <= 768) closeSidebarMobile();
            });
            searchResults.appendChild(div);
        });
    });

    // ===== TYPING INDICATOR =====
    messageInput.addEventListener('input', async () => {
        if (!activeChatId) return;
        
        // Set typing status
        const convRef = doc(db, "conversations", activeChatId);
        await setDoc(convRef, {
            [`typing.${currentUser.uid}`]: true
        }, { merge: true });
        
        // Clear after 2 seconds
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(async () => {
            await setDoc(convRef, {
                [`typing.${currentUser.uid}`]: false
            }, { merge: true });
        }, 2000);
        
        // Save draft
        localStorage.setItem(`draft_${activeChatId}`, messageInput.value);
    });

    // ===== START CHAT =====
    async function startChat(otherUser) {
        const ids = [currentUser.uid, otherUser.uid].sort();
        const convId = ids.join('_');
        const convRef = doc(db, "conversations", convId);
        const snap = await getDoc(convRef);

        if (!snap.exists()) {
            await setDoc(convRef, {
                participants: [currentUser.uid, otherUser.uid],
                createdAt: serverTimestamp(),
                updatedAt: serverTimestamp(),
                lastMessage: "",
                lastMessageSender: "",
                typing: {}
            });
        }

        const currentContacts = currentUserData.contacts || [];
        if (!currentContacts.some(c => c.uid === otherUser.uid)) {
            currentContacts.push({
                uid: otherUser.uid,
                displayName: otherUser.displayName,
                username: otherUser.username,
                lastInteraction: new Date().toISOString()
            });
            await updateDoc(doc(db, "users", currentUser.uid), { contacts: currentContacts });
            currentUserData.contacts = currentContacts;
        }

        openChat(convId, otherUser);
    }

    // ===== OPEN CHAT =====
    function openChat(convId, otherUser) {
        if (messagesUnsub) { messagesUnsub(); messagesUnsub = null; }

        activeChatId = convId;
        activeChatUser = otherUser;

        welcomeScreen.style.display = 'none';
        chatScreen.style.display = 'flex';

        $('chat-avatar').textContent = otherUser.displayName.charAt(0).toUpperCase();
        $('chat-name').textContent = otherUser.displayName;
        
        const statusEl = $('chat-status');
        if (otherUser.status === 'online') {
            statusEl.textContent = 'Online';
            statusEl.className = 'status-text online';
        } else {
            statusEl.textContent = 'Offline';
            statusEl.className = 'status-text offline';
        }

        // Load draft
        const draft = localStorage.getItem(`draft_${convId}`);
        messageInput.value = draft || '';
        messageInput.focus();

        document.querySelectorAll('#conversations-list .chat-item').forEach(item => {
            item.classList.toggle('active', item.dataset.convId === convId);
        });

        // Update pin button
        $('pin-chat-btn').querySelector('iconify-icon').setAttribute('icon', 
            currentUserData.pinnedChats?.includes(convId) ? 'mdi:pin' : 'mdi:pin-outline');

        const msgsQuery = query(
            collection(db, "conversations", convId, "messages"),
            orderBy("timestamp", "asc")
        );

        messagesUnsub = onSnapshot(msgsQuery, (snap) => {
            messagesArea.innerHTML = '';

            if (snap.empty) {
                messagesArea.innerHTML = `
                    <div style="text-align:center;color:var(--text-muted);padding:40px;">
                        <iconify-icon icon="mdi:chat-processing" style="font-size:44px;opacity:0.3;display:block;margin:0 auto 10px;"></iconify-icon>
                        <p>Send a message to start!</p>
                    </div>`;
                return;
            }

            let lastDate = '';
            snap.forEach((msgDoc, index) => {
                const msg = msgDoc.data();
                const isMine = msg.senderId === currentUser.uid;

                if (msg.timestamp) {
                    const d = msg.timestamp.toDate();
                    const dateStr = d.toLocaleDateString();
                    if (dateStr !== lastDate) {
                        lastDate = dateStr;
                        const sep = document.createElement('div');
                        sep.className = 'date-divider';
                        const now = new Date();
                        const yesterday = new Date(now);
                        yesterday.setDate(yesterday.getDate() - 1);
                        
                        if (dateStr === now.toLocaleDateString()) sep.textContent = 'Today';
                        else if (dateStr === yesterday.toLocaleDateString()) sep.textContent = 'Yesterday';
                        else sep.textContent = d.toLocaleDateString([], { weekday: 'long', month: 'short', day: 'numeric' });
                        
                        messagesArea.appendChild(sep);
                    }
                }

                const el = document.createElement('div');
                el.className = `msg ${isMine ? 'out' : 'in'}`;
                el.dataset.msgId = msgDoc.id;
                el.dataset.senderId = msg.senderId;

                let time = '';
                if (msg.timestamp) {
                    time = msg.timestamp.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                }

                // Status icons
                let statusIcon = '';
                if (isMine) {
                    if (msg.seen) {
                        statusIcon = '<iconify-icon icon="mdi:check-all" class="msg-status seen"></iconify-icon>';
                    } else if (msg.delivered) {
                        statusIcon = '<iconify-icon icon="mdi:check-all" class="msg-status delivered"></iconify-icon>';
                    } else {
                        statusIcon = '<iconify-icon icon="mdi:check" class="msg-status sent"></iconify-icon>';
                    }
                }

                // Reactions
                let reactionsHtml = '';
                if (msg.reactions && Object.keys(msg.reactions).length > 0) {
                    reactionsHtml = '<div class="msg-reactions">';
                    for (const [emoji, users] of Object.entries(msg.reactions)) {
                        reactionsHtml += `<span onclick="addReaction('${msgDoc.id}', '${emoji}')" title="${users.join(', ')}">${emoji} ${users.length}</span>`;
                    }
                    reactionsHtml += '</div>';
                }

                el.innerHTML = `
                    <div class="msg-bubble">
                        ${msg.text || ''}
                        ${msg.edited ? '<div class="msg-edited">edited</div>' : ''}
                    </div>
                    ${reactionsHtml}
                    <div class="msg-time">
                        ${time}
                        ${statusIcon}
                    </div>
                    ${isMine ? `
                        <div class="msg-actions">
                            <button class="msg-action-btn" onclick="window.addReaction('${msgDoc.id}', '❤️')" title="❤️">❤️</button>
                            <button class="msg-action-btn" onclick="window.addReaction('${msgDoc.id}', '😂')" title="😂">😂</button>
                            <button class="msg-action-btn" onclick="window.addReaction('${msgDoc.id}', '🔥')" title="🔥">🔥</button>
                            <button class="msg-action-btn" onclick="window.addReaction('${msgDoc.id}', '👍')" title="👍">👍</button>
                            <button class="msg-action-btn" onclick="window.editMessage('${msgDoc.id}', '${escapeHtml(msg.text || '')}', ${msg.timestamp?.toDate?.()?.getTime() || 0})" title="Edit">✏️</button>
                            <button class="msg-action-btn danger" onclick="window.deleteMessage('${msgDoc.id}')" title="Delete">🗑️</button>
                        </div>
                    ` : `
                        <div class="msg-actions">
                            <button class="msg-action-btn" onclick="window.addReaction('${msgDoc.id}', '❤️')" title="❤️">❤️</button>
                            <button class="msg-action-btn" onclick="window.addReaction('${msgDoc.id}', '😂')" title="😂">😂</button>
                            <button class="msg-action-btn" onclick="window.addReaction('${msgDoc.id}', '🔥')" title="🔥">🔥</button>
                            <button class="msg-action-btn" onclick="window.addReaction('${msgDoc.id}', '👍')" title="👍">👍</button>
                        </div>
                    `}
                `;

                // Double tap reaction (mobile)
                el.addEventListener('dblclick', () => {
                    window.addReaction(msgDoc.id, '❤️');
                });

                messagesArea.appendChild(el);
            });

            messagesArea.scrollTop = messagesArea.scrollHeight;
        });
    }

    function closeChat() {
        activeChatId = null;
        activeChatUser = null;
        if (messagesUnsub) { messagesUnsub(); messagesUnsub = null; }
        welcomeScreen.style.display = 'flex';
        chatScreen.style.display = 'none';
    }

    // ===== SEND MESSAGE (with spam protection) =====
    async function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;

        // Spam cooldown
        const now = Date.now();
        if (now - lastMessageTime < SPAM_COOLDOWN) {
            alert('Please wait before sending another message');
            return;
        }
        lastMessageTime = now;

        if (!activeChatId && activeChatUser) {
            await startChat(activeChatUser);
        }
        if (!activeChatId) return;

        messageInput.value = '';
        localStorage.removeItem(`draft_${activeChatId}`);

        // Clear typing
        await setDoc(doc(db, "conversations", activeChatId), {
            [`typing.${currentUser.uid}`]: false
        }, { merge: true });

        try {
            await addDoc(collection(db, "conversations", activeChatId, "messages"), {
                senderId: currentUser.uid,
                text: text,
                timestamp: serverTimestamp(),
                type: "text",
                delivered: false,
                seen: false,
                reactions: {}
            });

            await setDoc(doc(db, "conversations", activeChatId), {
                lastMessage: text,
                lastMessageSender: currentUser.uid,
                updatedAt: serverTimestamp()
            }, { merge: true });

            messageInput.focus();
        } catch (e) {
            console.error(e);
            messageInput.value = text;
        }
    }

    $('send-btn').addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // ===== REACTIONS =====
    window.addReaction = async function(msgId, emoji) {
        if (!activeChatId) return;
        
        const msgRef = doc(db, "conversations", activeChatId, "messages", msgId);
        const snap = await getDoc(msgRef);
        if (!snap.exists()) return;
        
        const msg = snap.data();
        const reactions = msg.reactions || {};
        
        if (!reactions[emoji]) reactions[emoji] = [];
        
        const idx = reactions[emoji].indexOf(currentUser.uid);
        if (idx > -1) {
            reactions[emoji].splice(idx, 1);
            if (reactions[emoji].length === 0) delete reactions[emoji];
        } else {
            reactions[emoji].push(currentUser.uid);
        }
        
        await updateDoc(msgRef, { reactions });
    };

    // ===== EDIT MESSAGE =====
    window.editMessage = function(msgId, currentText, timestamp) {
        const msgTime = new Date(timestamp).getTime();
        const now = Date.now();
        
        if (now - msgTime > EDIT_WINDOW) {
            alert('You can only edit messages within 15 minutes');
            return;
        }
        
        editingMessageId = msgId;
        $('edit-msg-input').value = currentText;
        showModal(editMsgModal);
        $('edit-msg-input').focus();
    };

    $('edit-msg-save').addEventListener('click', async () => {
        const newText = $('edit-msg-input').value.trim();
        if (!newText || !editingMessageId || !activeChatId) return;
        
        await updateDoc(doc(db, "conversations", activeChatId, "messages", editingMessageId), {
            text: newText,
            edited: true,
            editedAt: serverTimestamp()
        });
        
        hideModal(editMsgModal);
        editingMessageId = null;
    });

    $('edit-msg-cancel').addEventListener('click', () => {
        hideModal(editMsgModal);
        editingMessageId = null;
    });

    // ===== DELETE MESSAGE =====
    window.deleteMessage = async function(msgId) {
        if (!activeChatId) return;
        
        if (confirm('Delete this message?')) {
            await deleteDoc(doc(db, "conversations", activeChatId, "messages", msgId));
        }
    };

    // ===== USER INFO =====
    function showUserInfo(userData) {
        $('user-avatar').textContent = (userData.displayName || 'U').charAt(0).toUpperCase();
        $('user-name').textContent = userData.displayName || 'Unknown';
        $('user-username').textContent = '@' + (userData.username || 'user');
        $('user-email').textContent = userData.email || '-';
        $('user-bio').textContent = userData.bio || 'No bio yet';
        $('user-uid').textContent = userData.uid || '-';
        
        if (userData.createdAt?.toDate) {
            $('user-created').textContent = userData.createdAt.toDate().toLocaleDateString();
        } else {
            $('user-created').textContent = '-';
        }
        
        if (userData.lastLogin?.toDate) {
            $('user-lastseen').textContent = userData.lastLogin.toDate().toLocaleString();
        } else {
            $('user-lastseen').textContent = 'Recently';
        }
        
        showModal(userModal);
    }

    $('user-close-btn').addEventListener('click', () => hideModal(userModal));
    $('chat-avatar').addEventListener('click', () => { if (activeChatUser) showUserInfo(activeChatUser); });
    $('chat-info-btn').addEventListener('click', () => { if (activeChatUser) showUserInfo(activeChatUser); });

    // ===== EDIT PROFILE =====
    $('profile-section').addEventListener('click', () => {
        $('edit-avatar').textContent = currentUserData.displayName.charAt(0).toUpperCase();
        $('edit-username-display').textContent = '@' + currentUserData.username;
        $('edit-name').value = currentUserData.displayName || '';
        $('edit-bio').value = currentUserData.bio || '';
        showModal(editModal);
    });

    $('edit-cancel').addEventListener('click', () => hideModal(editModal));

    $('edit-save').addEventListener('click', async () => {
        const newName = $('edit-name').value.trim();
        const newBio = $('edit-bio').value.trim();
        
        if (!newName) { alert('Name cannot be empty'); return; }

        const userRef = doc(db, "users", currentUser.uid);
        const updates = {
            displayName: newName,
            bio: newBio,
            searchKeywords: [currentUserData.username, newName.toLowerCase()]
        };
        
        await updateDoc(userRef, updates);
        currentUserData = { ...currentUserData, ...updates };
        updateSelfUI();
        hideModal(editModal);
    });

    // ===== LOGOUT =====
    $('logout-btn').addEventListener('click', async () => {
        if (!confirm('Sign out?')) return;
        if (currentUser) {
            await updateDoc(doc(db, "users", currentUser.uid), { status: "offline", lastLogin: serverTimestamp() });
        }
        await signOut(auth);
        window.location.href = "auth.html";
    });

    // ===== ONLINE/OFFLINE =====
    window.addEventListener('online', () => {
        if (currentUser) updateDoc(doc(db, "users", currentUser.uid), { status: "online" });
    });
    window.addEventListener('beforeunload', () => {
        if (currentUser) {
            updateDoc(doc(db, "users", currentUser.uid), { status: "offline", lastLogin: serverTimestamp() });
        }
    });

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function closeSidebarMobile() {
        sidebar.classList.remove('open');
        overlay.classList.remove('show');
    }

    console.log('🚀 NovaChat Pro Ready!');
    console.log('✨ Features: Reactions, Edit, Delete, Pin, Typing, Status, Online, Spam Protection');
</script>
</body>
</html>
