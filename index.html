<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>NovaChat</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    
    <style>
        :root {
            --bg-primary: #0F172A;
            --bg-secondary: #1E293B;
            --bg-tertiary: #0F172A;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --border-color: rgba(124, 58, 237, 0.2);
            --border-input: rgba(124, 58, 237, 0.25);
            --accent: #9D5CF6;
            --accent-light: #7C3AED;
            --bubble-received: #1E293B;
            --hover-bg: rgba(124, 58, 237, 0.1);
            --active-bg: rgba(124, 58, 237, 0.2);
            --online-color: #34D399;
            --danger: #F87171;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            --popup-bg: rgba(0, 0, 0, 0.7);
            --glass-bg: rgba(30, 41, 59, 0.8);
            --glass-border: rgba(124, 58, 237, 0.2);
        }

        body.light-theme {
            --bg-primary: #F8FAFC;
            --bg-secondary: #FFFFFF;
            --bg-tertiary: #F1F5F9;
            --text-primary: #1E293B;
            --text-secondary: #64748B;
            --text-muted: #94A3B8;
            --border-color: rgba(124, 58, 237, 0.15);
            --border-input: rgba(124, 58, 237, 0.2);
            --bubble-received: #F1F5F9;
            --hover-bg: rgba(124, 58, 237, 0.05);
            --active-bg: rgba(124, 58, 237, 0.1);
            --popup-bg: rgba(0, 0, 0, 0.4);
            --shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(124, 58, 237, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        body.chat-open .bottom-nav {
            display: none !important;
        }

        body.chat-open .chat-main {
            padding-bottom: 0 !important;
        }

        .app {
            display: flex;
            height: 100vh;
            height: 100dvh;
        }

        .sidebar {
            width: 320px;
            min-width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-header {
            padding: 20px 16px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 16px;
        }

        .logo iconify-icon { font-size: 30px; }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-tertiary);
            border: 2px solid var(--border-input);
            border-radius: 14px;
            padding: 10px 14px;
            transition: all 0.3s;
        }

        .search-box:focus-within {
            border-color: var(--accent-light);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .search-box iconify-icon { color: var(--accent); font-size: 18px; }

        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 14px;
            width: 100%;
            font-family: 'Poppins', sans-serif;
        }

        .search-box input::placeholder { color: var(--text-muted); }

        .search-results {
            max-height: 250px;
            overflow-y: auto;
            border-bottom: 1px solid var(--border-color);
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 16px 16px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 8px;
        }

        .chat-list::-webkit-scrollbar,
        .search-results::-webkit-scrollbar { width: 5px; }

        .chat-list::-webkit-scrollbar-thumb,
        .search-results::-webkit-scrollbar-thumb {
            background: rgba(124, 58, 237, 0.3);
            border-radius: 10px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 2px;
            position: relative;
        }

        .chat-item:hover { background: var(--hover-bg); }
        .chat-item:active { transform: scale(0.98); }

        .chat-item.active {
            background: var(--active-bg);
            border: 1px solid rgba(124, 58, 237, 0.3);
        }

        .chat-item.pinned {
            border-left: 3px solid var(--accent-light);
        }

        .avatar {
            width: 46px;
            height: 46px;
            min-width: 46px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7C3AED, #5B21B6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            color: #fff;
            position: relative;
            transition: transform 0.3s;
        }

        .avatar:hover { transform: scale(1.05); }
        .avatar.sm { width: 38px; height: 38px; min-width: 38px; font-size: 15px; }

        .avatar.online::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: var(--online-color);
            border-radius: 50%;
            border: 2px solid var(--bg-secondary);
        }

        .chat-info { flex: 1; overflow: hidden; }

        .chat-info .name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-info .preview {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-info .typing {
            color: var(--accent-light);
            font-style: italic;
        }

        .unread-badge {
            background: var(--accent-light);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 12px;
            min-width: 22px;
            text-align: center;
        }

        .pin-icon {
            color: var(--accent-light);
            font-size: 14px;
            margin-left: 4px;
        }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-tertiary);
        }

        .sidebar-footer .user-section {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
            cursor: pointer;
            padding: 4px;
            border-radius: 10px;
            transition: background 0.2s;
        }

        .sidebar-footer .user-section:hover { background: var(--hover-bg); }

        .sidebar-footer .user-details { flex: 1; min-width: 0; }

        .sidebar-footer .user-details .name {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-footer .user-details .status {
            font-size: 11px;
            color: var(--online-color);
            font-weight: 500;
        }

        .icon-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            width: 38px;
            height: 38px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 18px;
        }

        .icon-btn:hover {
            background: var(--hover-bg);
            border-color: var(--accent-light);
            color: var(--accent);
        }

        .icon-btn:active { transform: scale(0.95); }

        .icon-btn.danger:hover {
            background: rgba(248, 113, 113, 0.1);
            border-color: var(--danger);
            color: var(--danger);
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            min-width: 0;
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
        }

        .chat-header .avatar { cursor: pointer; }

        .chat-header-info { flex: 1; min-width: 0; }

        .chat-header-info .name {
            font-size: 16px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-header-info .status-text {
            font-size: 12px;
            font-weight: 500;
        }

        .chat-header-info .status-text.online { color: var(--online-color); }
        .chat-header-info .status-text.offline { color: var(--text-muted); }
        .chat-header-info .status-text.typing { color: var(--accent-light); }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            scroll-behavior: smooth;
        }

        .messages-container::-webkit-scrollbar { width: 5px; }
        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(124, 58, 237, 0.2);
            border-radius: 10px;
        }

        .date-divider {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            padding: 16px 0 8px;
            font-weight: 500;
        }

        .msg {
            display: flex;
            flex-direction: column;
            max-width: 68%;
            position: relative;
        }

        .msg.in { align-self: flex-start; }
        .msg.out { align-self: flex-end; }

        .msg-bubble {
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .msg.in .msg-bubble {
            background: var(--bubble-received);
            color: var(--text-primary);
            border-bottom-left-radius: 6px;
        }

        .msg.out .msg-bubble {
            background: linear-gradient(135deg, #7C3AED, #5B21B6);
            color: #fff;
            border-bottom-right-radius: 6px;
        }

        .quote {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 6px;
            padding: 6px 10px;
            background: rgba(124, 58, 237, 0.1);
            border-radius: 10px;
            cursor: pointer;
        }

        .quote:hover {
            background: rgba(124, 58, 237, 0.2);
        }

        .msg-time {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
            padding: 0 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .msg.out .msg-time { justify-content: flex-end; }

        .msg-status { font-size: 12px; }
        .msg-status.sent { color: var(--text-muted); }
        .msg-status.delivered { color: var(--text-muted); }
        .msg-status.seen { color: var(--accent-light); }

        .msg-reactions {
            display: flex;
            gap: 4px;
            margin-top: 4px;
            padding: 2px 8px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-size: 16px;
        }

        .msg-reactions span {
            cursor: pointer;
            transition: transform 0.2s;
        }

        .msg-reactions span:hover { transform: scale(1.3); }

        .msg-actions {
            display: none;
            position: absolute;
            top: -30px;
            right: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 4px;
            gap: 4px;
            z-index: 10;
        }

        .msg:hover .msg-actions {
            display: flex;
        }

        .msg-action-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 16px;
        }

        .msg-action-btn:hover {
            background: var(--hover-bg);
            color: var(--accent-light);
        }

        .msg-action-btn.danger:hover { color: var(--danger); }

        .msg-edited {
            font-size: 10px;
            color: var(--text-muted);
            font-style: italic;
            margin-top: 2px;
        }

        .reply-bar {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--glass-border);
            font-size: 12px;
        }

        .reply-bar .reply-content {
            flex: 1;
            overflow: hidden;
        }

        .reply-bar .reply-content .reply-who {
            font-weight: 600;
            color: var(--accent);
            font-size: 11px;
        }

        .reply-bar .reply-content .reply-what {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-secondary);
            font-size: 11px;
        }

        .reply-bar .cancel-reply {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
        }

        .input-area {
            padding: 14px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .input-wrapper input {
            width: 100%;
            background: var(--bg-tertiary);
            border: 2px solid var(--border-input);
            border-radius: 24px;
            padding: 12px 18px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            font-family: 'Poppins', sans-serif;
        }

        .input-wrapper input:focus {
            border-color: var(--accent-light);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .input-wrapper input::placeholder { color: var(--text-muted); }

        .char-counter {
            font-size: 10px;
            color: var(--text-muted);
            text-align: right;
            padding: 2px 8px 0;
        }

        .send-btn {
            width: 46px;
            height: 46px;
            min-width: 46px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7C3AED, #5B21B6);
            border: none;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.5);
        }

        .send-btn:active { transform: scale(0.9); }
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .send-btn.shake {
            animation: shake 0.3s ease;
        }

        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            text-align: center;
            padding: 30px;
        }

        .welcome iconify-icon { font-size: 80px; opacity: 0.25; color: var(--accent); }
        .welcome h2 { font-size: 24px; font-weight: 700; color: var(--text-primary); }
        .welcome p { font-size: 14px; color: var(--text-secondary); max-width: 320px; }

        .context-menu {
            position: fixed;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 8px;
            box-shadow: var(--shadow);
            z-index: 1000;
            min-width: 160px;
        }

        .context-menu button {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 10px 16px;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            border-radius: 10px;
        }

        .context-menu button:hover {
            background: var(--hover-bg);
        }

        .context-menu button.danger { color: var(--danger); }

        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            padding-bottom: env(safe-area-inset-bottom, 8px);
            justify-content: space-around;
            border-top: 1px solid var(--glass-border);
            z-index: 90;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 24px;
            font-size: 11px;
            font-family: 'Poppins', sans-serif;
        }

        .nav-item.active {
            color: var(--accent);
            background: var(--active-bg);
        }

        .nav-item iconify-icon { font-size: 22px; }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--popup-bg);
            z-index: 300;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
        }

        .modal-overlay.show { display: flex; }

        .modal {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px 28px;
            width: 92%;
            max-width: 420px;
            text-align: center;
            box-shadow: var(--shadow);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal .modal-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7C3AED, #5B21B6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            color: #fff;
            margin: 0 auto 16px;
            border: 4px solid var(--accent-light);
        }

        .modal h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 2px;
            color: var(--text-primary);
        }

        .modal .uname {
            font-size: 14px;
            color: var(--accent);
            margin-bottom: 16px;
            font-weight: 500;
        }

        .modal .info-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 0;
            border-top: 1px solid var(--border-color);
            text-align: left;
            font-size: 13px;
        }

        .modal .info-row iconify-icon {
            font-size: 18px;
            color: var(--accent-light);
            margin-top: 2px;
        }

        .modal .info-row .lbl {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal .info-row .val {
            color: var(--text-secondary);
            font-weight: 400;
            font-size: 13px;
        }

        .modal .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }

        .modal .btn {
            flex: 1;
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            border: 1px solid var(--border-color);
        }

        .modal .btn-close {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        .modal .btn-close:hover { background: var(--active-bg); }

        .modal .btn-primary {
            background: linear-gradient(135deg, #7C3AED, #5B21B6);
            color: #fff;
            border: none;
        }

        .modal .btn-primary:hover { opacity: 0.9; }

        .modal .edit-input, .modal .edit-textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border: 2px solid var(--border-input);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            outline: none;
            margin-top: 4px;
        }

        .modal .edit-input:focus, .modal .edit-textarea:focus {
            border-color: var(--accent-light);
        }

        .modal .edit-textarea {
            resize: vertical;
            min-height: 60px;
        }

        .emoji-picker {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            z-index: 200;
            box-shadow: var(--shadow);
            width: min(340px, 92vw);
        }

        .emoji-picker span {
            font-size: 28px;
            cursor: pointer;
            padding: 8px;
            border-radius: 12px;
            text-align: center;
        }

        .emoji-picker span:hover {
            background: var(--hover-bg);
            transform: scale(1.1);
        }

        .menu-btn {
            display: none;
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 50;
            background: var(--accent-light);
            border: none;
            color: #fff;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
        }

        .back-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 24px;
            cursor: pointer;
            padding: 6px;
            margin-right: 4px;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
            backdrop-filter: blur(3px);
        }

        .sidebar-overlay.show { display: block; }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                width: 85%;
                max-width: 340px;
                transform: translateX(-100%);
                z-index: 100;
            }
            .sidebar.open { transform: translateX(0); }
            .menu-btn { display: flex; }
            .back-btn { display: block; }
            .bottom-nav { display: flex; }
            .chat-main { padding-bottom: 70px; }
            .msg { max-width: 85%; }
            .msg-actions { display: flex !important; position: static; margin-top: 4px; }
            .input-area { flex-wrap: wrap; }
            .input-wrapper { width: calc(100% - 56px); }
            .sidebar-header { padding-top: env(safe-area-inset-top, 16px); }
            .emoji-picker { width: 90vw; bottom: 70px; }
        }

        @media (max-width: 480px) {
            .msg { max-width: 90%; }
            .msg-bubble { font-size: 13px; padding: 8px 12px; }
            .modal { padding: 20px 16px; }
        }

        @media (min-width: 769px) {
            .menu-btn, .sidebar-overlay, .back-btn { display: none; }
        }
    </style>
</head>
<body>

    <iconify-icon icon="mdi:menu"></iconify-icon>
</button>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="modal-overlay" id="edit-modal">

        <h2>Edit Profile</h2>

    <div class="modal">
        <div class="modal-avatar" id="user-avatar">U</div>
        <h2 id="user-name">User</h2>
        <p class="uname" id="user-username">@username</p>
        <div class="info-row">
            <iconify-icon icon="mdi:email-outline"></iconify-icon>
            <div><div class="lbl">Email</div><div class="val" id="user-email">-</div></div>
        </div>
        <div class="info-row">
            <iconify-icon icon="mdi:information-outline"></iconify-icon>
            <div><div class="lbl">Bio</div><div class="val" id="user-bio">No bio yet</div></div>
        </div>
        <div class="info-row">

        <div class="info-row">

<div class="modal-overlay" id="edit-msg-modal">
    <div class="modal">
        <h2>Edit Message</h2>
        <input type="text" class="edit-input" id="edit-msg-input" placeholder="Edit your message..." style="margin-top:16px;"/>
        <div class="btn-row">

            <button class="btn btn-primary" id="edit-msg-save">Save</button>

</div>

<div class="app">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <iconify-icon icon="mdi:chat-processing-outline"></iconify-icon>
                NovaChat
            </div>
            <div class="search-box">
                <iconify-icon icon="mdi:magnify"></iconify-icon>
                <input type="text" id="search-input" placeholder="Search users..." autocomplete="off"/>
            </div>
        </div>
        <div class="search-results" id="search-results"></div>
        <div class="section-title">
            <span>Messages</span>
            <span id="online-count" style="color:var(--online-color);font-size:10px;"></span>
        </div>
        <div class="chat-list" id="conversations-list"></div>
        <div class="sidebar-footer">
            <div class="user-section" id="profile-section" title="Edit Profile">
                <div class="avatar sm" id="self-avatar">U</div>
                <div class="user-details">
                    <div class="name" id="self-name">User</div>
                    <div class="status">Online</div>
                </div>
            </div>
            <button class="icon-btn" id="theme-btn" title="Toggle Theme">

    <main class="chat-main">
        <div class="welcome" id="welcome-screen">

        <div id="chat-screen" style="display:none; flex:1; flex-direction:column;">
            <div class="chat-header">
                <button class="back-btn" id="back-btn">
                    <iconify-icon icon="mdi:arrow-left"></iconify-icon>
                </button>
                <div class="avatar sm" id="chat-avatar" style="cursor:pointer;">U</div>
                <div class="chat-header-info">
                    <div class="name" id="chat-name">User</div>
                    <div class="status-text offline" id="chat-status">offline</div>
                </div>
                <button class="icon-btn" id="pin-chat-btn" title="Pin Chat">
                    <iconify-icon icon="mdi:pin-outline"></iconify-icon>
                </button>
                <button class="icon-btn" id="chat-info-btn" title="User Info">
                    <iconify-icon icon="mdi:information-outline"></iconify-icon>
                </button>
            </div>
            <div class="messages-container" id="messages-container"></div>
            <div class="reply-bar" id="reply-bar" style="display:none;">
                <iconify-icon icon="mdi:reply" style="color:var(--accent);"></iconify-icon>
                <div class="reply-content">
                    <div class="reply-who" id="reply-who"></div>
                    <div class="reply-what" id="reply-what"></div>
                </div>
                <button class="cancel-reply" id="cancel-reply">✕</button>
            </div>
            <div class="input-area">
                <button class="icon-btn" id="emoji-btn" title="Emoji">
                    <iconify-icon icon="mdi:emoticon-outline"></iconify-icon>
                </button>
                <div class="input-wrapper">
                    <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" maxlength="500"/>
                    <div class="char-counter" id="char-counter" style="display:none;"></div>
                </div>
                <button class="send-btn" id="send-btn" title="Send" disabled>
                    <iconify-icon icon="mdi:send"></iconify-icon>
