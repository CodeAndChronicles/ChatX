<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>NovaChat</title>
    
    <!-- Google Fonts - Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0F172A;
            color: #F8FAFC;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .app {
            display: flex;
            height: 100vh;
            height: 100dvh;
            max-width: 100vw;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: 320px;
            min-width: 320px;
            background: #1E293B;
            border-right: 1px solid rgba(124, 58, 237, 0.2);
            display: flex;
            flex-direction: column;
            height: 100%;
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-header {
            padding: 20px 16px 12px;
            border-bottom: 1px solid rgba(124, 58, 237, 0.15);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 700;
            color: #9D5CF6;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .logo iconify-icon {
            font-size: 30px;
        }

        .search-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0F172A;
            border: 1.5px solid rgba(124, 58, 237, 0.25);
            border-radius: 14px;
            padding: 10px 14px;
            transition: border-color 0.3s;
        }

        .search-bar:focus-within {
            border-color: #7C3AED;
        }

        .search-bar iconify-icon {
            color: #9D5CF6;
            font-size: 20px;
            flex-shrink: 0;
        }

        .search-bar input {
            background: transparent;
            border: none;
            outline: none;
            color: #F8FAFC;
            font-size: 14px;
            width: 100%;
            font-family: 'Poppins', sans-serif;
        }

        .search-bar input::placeholder {
            color: #64748B;
            font-weight: 300;
        }

        .search-results {
            max-height: 250px;
            overflow-y: auto;
            border-bottom: 1px solid rgba(124, 58, 237, 0.1);
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            color: #64748B;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 16px 16px 8px;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 8px;
            min-height: 0;
        }

        .chat-list::-webkit-scrollbar,
        .search-results::-webkit-scrollbar {
            width: 5px;
        }

        .chat-list::-webkit-scrollbar-track,
        .search-results::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-list::-webkit-scrollbar-thumb,
        .search-results::-webkit-scrollbar-thumb {
            background: rgba(124, 58, 237, 0.3);
            border-radius: 10px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 2px;
            position: relative;
        }

        .chat-item:hover {
            background: rgba(124, 58, 237, 0.1);
        }

        .chat-item:active {
            background: rgba(124, 58, 237, 0.2);
            transform: scale(0.98);
        }

        .chat-item.active {
            background: rgba(124, 58, 237, 0.2);
            border: 1px solid rgba(124, 58, 237, 0.3);
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            min-width: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7C3AED, #5B21B6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 17px;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .user-avatar.online {
            border: 2px solid #34D399;
        }

        .user-avatar.small {
            width: 38px;
            height: 38px;
            min-width: 38px;
            font-size: 15px;
        }

        .chat-item-info {
            flex: 1;
            overflow: hidden;
            min-width: 0;
        }

        .chat-item-info p {
            font-size: 14px;
            font-weight: 600;
            color: #F8FAFC;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-item-info span {
            font-size: 12px;
            color: #64748B;
            display: block;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 400;
        }

        .unread-badge {
            background: #7C3AED;
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 20px;
            text-align: center;
        }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid rgba(124, 58, 237, 0.15);
            background: rgba(15, 23, 42, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-footer .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        .sidebar-footer .user-details {
            flex: 1;
            min-width: 0;
        }

        .sidebar-footer .user-details p {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-footer .user-details span {
            font-size: 11px;
            color: #34D399;
            font-weight: 500;
        }

        .logout-btn, .settings-btn {
            background: transparent;
            border: 1px solid rgba(124, 58, 237, 0.2);
            color: #94A3B8;
            width: 38px;
            height: 38px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 18px;
        }

        .logout-btn:hover {
            background: rgba(248, 113, 113, 0.15);
            border-color: rgba(248, 113, 113, 0.4);
            color: #F87171;
        }

        .settings-btn:hover {
            background: rgba(124, 58, 237, 0.15);
            border-color: rgba(124, 58, 237, 0.4);
            color: #9D5CF6;
        }

        /* ========== MAIN CHAT AREA ========== */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0F172A;
            min-width: 0;
            position: relative;
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            background: #1E293B;
            border-bottom: 1px solid rgba(124, 58, 237, 0.15);
            flex-shrink: 0;
        }

        .chat-header .user-avatar {
            cursor: pointer;
            transition: transform 0.2s;
        }

        .chat-header .user-avatar:hover {
            transform: scale(1.1);
        }

        .chat-header-info {
            flex: 1;
            min-width: 0;
        }

        .chat-header-info p {
            font-size: 16px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-header-info span {
            font-size: 12px;
            color: #34D399;
            font-weight: 500;
        }

        .chat-header-info span.offline {
            color: #64748B;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: #94A3B8;
            width: 38px;
            height: 38px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 20px;
        }

        .icon-btn:hover {
            background: rgba(124, 58, 237, 0.15);
            color: #9D5CF6;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .messages-container::-webkit-scrollbar {
            width: 5px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(124, 58, 237, 0.3);
            border-radius: 10px;
        }

        .date-separator {
            text-align: center;
            font-size: 11px;
            color: #64748B;
            padding: 12px 0;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 70%;
            animation: messageSlide 0.3s ease;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.received {
            align-self: flex-start;
        }

        .message.sent {
            align-self: flex-end;
        }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            overflow-wrap: break-word;
            font-weight: 400;
        }

        .message.received .message-bubble {
            background: #1E293B;
            color: #F8FAFC;
            border-bottom-left-radius: 6px;
        }

        .message.sent .message-bubble {
            background: linear-gradient(135deg, #7C3AED, #5B21B6);
            color: #fff;
            border-bottom-right-radius: 6px;
        }

        .message-time {
            font-size: 10px;
            color: #64748B;
            margin-top: 3px;
            padding: 0 6px;
            font-weight: 400;
        }

        .message.sent .message-time {
            text-align: right;
        }

        .message-input-container {
            padding: 14px 20px;
            background: #1E293B;
            border-top: 1px solid rgba(124, 58, 237, 0.15);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .attach-btn {
            background: transparent;
            border: none;
            color: #94A3B8;
            font-size: 22px;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .attach-btn:hover {
            color: #9D5CF6;
        }

        .message-input-container input {
            flex: 1;
            background: #0F172A;
            border: 1.5px solid rgba(124, 58, 237, 0.25);
            border-radius: 24px;
            padding: 12px 18px;
            color: #F8FAFC;
            font-size: 14px;
            outline: none;
            font-family: 'Poppins', sans-serif;
            transition: border-color 0.3s;
        }

        .message-input-container input:focus {
            border-color: #7C3AED;
        }

        .message-input-container input::placeholder {
            color: #475569;
            font-weight: 300;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            min-width: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7C3AED, #5B21B6);
            border: none;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .empty-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: #475569;
            text-align: center;
            padding: 20px;
        }

        .empty-chat iconify-icon {
            font-size: 80px;
            opacity: 0.3;
        }

        .empty-chat h3 {
            font-size: 22px;
            font-weight: 700;
            color: #64748B;
            letter-spacing: -0.5px;
        }

        .empty-chat p {
            font-size: 14px;
            color: #475569;
            font-weight: 300;
            max-width: 300px;
        }

        /* ========== USER INFO POPUP ========== */
        .popup-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .popup-overlay.show {
            display: flex;
        }

        .popup {
            background: #1E293B;
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            animation: popupIn 0.3s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        @keyframes popupIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .popup .avatar-large {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7C3AED, #5B21B6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            color: #fff;
            margin: 0 auto 16px;
            border: 4px solid #7C3AED;
        }

        .popup h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .popup .username {
            font-size: 14px;
            color: #9D5CF6;
            margin-bottom: 16px;
            font-weight: 500;
        }

        .popup .info-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-top: 1px solid rgba(124, 58, 237, 0.15);
            text-align: left;
            font-size: 13px;
            color: #94A3B8;
        }

        .popup .info-row iconify-icon {
            font-size: 18px;
            color: #7C3AED;
            flex-shrink: 0;
        }

        .popup .info-row .label {
            font-weight: 600;
            color: #F8FAFC;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .popup .info-row .value {
            color: #94A3B8;
            font-weight: 400;
        }

        .popup .close-btn {
            margin-top: 20px;
            background: rgba(124, 58, 237, 0.15);
            border: 1px solid rgba(124, 58, 237, 0.3);
            color: #F8FAFC;
            padding: 10px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            transition: all 0.2s;
        }

        .popup .close-btn:hover {
            background: rgba(124, 58, 237, 0.3);
        }

        /* ========== MOBILE ========== */
        .menu-btn {
            display: none;
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 50;
            background: #7C3AED;
            border: none;
            color: white;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
        }

        .back-btn {
            display: none;
            background: none;
            border: none;
            color: #F8FAFC;
            font-size: 24px;
            cursor: pointer;
            padding: 6px;
            margin-right: 4px;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                width: 85%;
                max-width: 340px;
                transform: translateX(-100%);
                box-shadow: 4px 0 30px rgba(0, 0, 0, 0.5);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.6);
                z-index: 99;
                backdrop-filter: blur(2px);
            }

            .sidebar-overlay.show {
                display: block;
            }

            .menu-btn {
                display: flex;
            }

            .back-btn {
                display: block;
            }

            .chat-header {
                padding-left: 12px;
            }

            .message {
                max-width: 85%;
            }
        }

        @media (max-width: 480px) {
            .message {
                max-width: 90%;
            }

            .message-bubble {
                font-size: 13px;
                padding: 8px 12px;
            }

            .chat-header {
                padding: 10px 12px;
            }

            .message-input-container {
                padding: 10px 12px;
                gap: 6px;
            }

            .message-input-container input {
                padding: 10px 14px;
                font-size: 13px;
            }

            .send-btn {
                width: 40px;
                height: 40px;
                min-width: 40px;
                font-size: 20px;
            }
        }

        @media (min-width: 769px) {
            .menu-btn, .sidebar-overlay, .back-btn {
                display: none;
            }
        }
    </style>
</head>
<body>

<button class="menu-btn" id="menu-btn">
    <iconify-icon icon="mdi:menu"></iconify-icon>
</button>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<!-- USER INFO POPUP -->
<div class="popup-overlay" id="user-popup">
    <div class="popup">
        <div class="avatar-large" id="popup-avatar">U</div>
        <h2 id="popup-name">User</h2>
        <p class="username" id="popup-username">@username</p>
        <div class="info-row">
            <iconify-icon icon="mdi:email-outline"></iconify-icon>
            <div>
                <div class="label">Email</div>
                <div class="value" id="popup-email">-</div>
            </div>
        </div>
        <div class="info-row">
            <iconify-icon icon="mdi:information-outline"></iconify-icon>
            <div>
                <div class="label">Bio</div>
                <div class="value" id="popup-bio">No bio yet</div>
            </div>
        </div>
        <div class="info-row">
            <iconify-icon icon="mdi:clock-outline"></iconify-icon>
            <div>
                <div class="label">Last Seen</div>
                <div class="value" id="popup-lastseen">-</div>
            </div>
        </div>
        <button class="close-btn" id="popup-close">Close</button>
    </div>
</div>

<div class="app">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <iconify-icon icon="mdi:chat-processing-outline"></iconify-icon>
                NovaChat
            </div>
            <div class="search-bar">
                <iconify-icon icon="mdi:magnify"></iconify-icon>
                <input type="text" id="search-input" placeholder="Search users..." autocomplete="off"/>
            </div>
        </div>

        <div class="search-results" id="search-results"></div>

        <div class="section-title">Messages</div>
        <div class="chat-list" id="conversations-list"></div>

        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar small" id="self-avatar">U</div>
                <div class="user-details">
                    <p id="self-name">User</p>
                    <span>Online</span>
                </div>
            </div>
            <button class="settings-btn" id="settings-btn" title="My Profile">
                <iconify-icon icon="mdi:account-circle-outline"></iconify-icon>
            </button>
            <button class="logout-btn" id="logout-btn" title="Sign Out">
                <iconify-icon icon="mdi:logout"></iconify-icon>
            </button>
        </div>
    </aside>

    <!-- MAIN CHAT -->
    <main class="chat-main" id="chat-main">
        <div class="empty-chat" id="welcome-screen">
            <iconify-icon icon="mdi:chat-outline"></iconify-icon>
            <h3>Welcome to NovaChat</h3>
            <p>Search for someone to start a conversation</p>
        </div>

        <div id="chat-screen" style="display:none; flex:1; flex-direction:column; min-height:0;">
            <div class="chat-header">
                <button class="back-btn" id="back-btn">
                    <iconify-icon icon="mdi:arrow-left"></iconify-icon>
                </button>
                <div class="user-avatar small" id="chat-avatar" style="cursor:pointer;" title="View profile">U</div>
                <div class="chat-header-info">
                    <p id="chat-name">User</p>
                    <span id="chat-status">offline</span>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" id="chat-info-btn" title="User Info">
                        <iconify-icon icon="mdi:information-outline"></iconify-icon>
                    </button>
                </div>
            </div>

            <div class="messages-container" id="messages-container"></div>

            <div class="message-input-container">
                <button class="attach-btn" title="Attach">
                    <iconify-icon icon="mdi:plus-circle-outline"></iconify-icon>
                </button>
                <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off"/>
                <button class="send-btn" id="send-btn" title="Send">
                    <iconify-icon icon="mdi:send"></iconify-icon>
                </button>
            </div>
        </div>
    </main>
</div>

<script type="module">
    import { auth, db } from "./firebase-config.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { 
        collection, doc, getDoc, getDocs, setDoc, addDoc, 
        query, where, orderBy, onSnapshot, serverTimestamp, limit,
        updateDoc, arrayUnion
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ===== STATE =====
    let currentUser = null;
    let currentUserData = null;
    let activeChatId = null;
    let activeChatUser = null;
    let messagesUnsub = null;
    let convsUnsub = null;
    let usersCache = [];

    // ===== DOM =====
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const menuBtn = document.getElementById('menu-btn');
    const backBtn = document.getElementById('back-btn');
    const welcomeScreen = document.getElementById('welcome-screen');
    const chatScreen = document.getElementById('chat-screen');
    const searchInput = document.getElementById('search-input');
    const searchResults = document.getElementById('search-results');
    const conversationsList = document.getElementById('conversations-list');
    const messagesContainer = document.getElementById('messages-container');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const settingsBtn = document.getElementById('settings-btn');
    const chatInfoBtn = document.getElementById('chat-info-btn');
    const chatAvatar = document.getElementById('chat-avatar');
    
    // Popup
    const userPopup = document.getElementById('user-popup');
    const popupClose = document.getElementById('popup-close');

    // ===== MOBILE MENU =====
    function openSidebar() {
        sidebar.classList.add('open');
        overlay.classList.add('show');
        document.body.style.overflow = 'hidden';
    }
    function closeSidebar() {
        sidebar.classList.remove('open');
        overlay.classList.remove('show');
        document.body.style.overflow = '';
    }
    menuBtn.addEventListener('click', openSidebar);
    overlay.addEventListener('click', closeSidebar);

    backBtn.addEventListener('click', () => {
        activeChatId = null;
        activeChatUser = null;
        if (messagesUnsub) { messagesUnsub(); messagesUnsub = null; }
        welcomeScreen.style.display = 'flex';
        chatScreen.style.display = 'none';
        updateActiveState();
    });

    function handleMobileSelect() {
        if (window.innerWidth <= 768) closeSidebar();
    }

    // ===== POPUP =====
    function showUserPopup(userData) {
        document.getElementById('popup-avatar').textContent = (userData.displayName || 'U').charAt(0).toUpperCase();
        document.getElementById('popup-name').textContent = userData.displayName || 'Unknown';
        document.getElementById('popup-username').textContent = '@' + (userData.username || 'user');
        document.getElementById('popup-email').textContent = userData.email || '-';
        document.getElementById('popup-bio').textContent = userData.bio || 'No bio yet';
        
        if (userData.lastLogin && userData.lastLogin.toDate) {
            const d = userData.lastLogin.toDate();
            document.getElementById('popup-lastseen').textContent = d.toLocaleString();
        } else {
            document.getElementById('popup-lastseen').textContent = userData.status === 'online' ? 'Online now' : 'Recently';
        }
        
        userPopup.classList.add('show');
    }

    popupClose.addEventListener('click', () => userPopup.classList.remove('show'));
    userPopup.addEventListener('click', (e) => {
        if (e.target === userPopup) userPopup.classList.remove('show');
    });

    // ===== AUTH =====
    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "auth.html"; return; }
        currentUser = user;
        
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);
        
        if (userSnap.exists()) {
            currentUserData = userSnap.data();
        } else {
            currentUserData = {
                uid: user.uid,
                email: user.email,
                displayName: user.displayName || user.email.split('@')[0],
                username: (user.displayName || user.email.split('@')[0]).toLowerCase().replace(/\s+/g, ''),
                photoURL: "",
                bio: "",
                status: "online",
                createdAt: serverTimestamp(),
                lastLogin: serverTimestamp(),
                searchKeywords: [],
                contacts: []
            };
            currentUserData.searchKeywords = [currentUserData.username, currentUserData.displayName.toLowerCase()];
            await setDoc(userRef, currentUserData);
        }

        // تحديث الحالة
        await updateDoc(userRef, { status: "online", lastLogin: serverTimestamp() });

        document.getElementById('self-name').textContent = currentUserData.displayName;
        document.getElementById('self-avatar').textContent = currentUserData.displayName.charAt(0).toUpperCase();

        await cacheUsers();
        listenToConversations();
    });

    // ===== CACHE USERS =====
    async function cacheUsers() {
        const snap = await getDocs(collection(db, "users"));
        usersCache = [];
        snap.forEach(d => {
            if (d.data().uid !== currentUser.uid) usersCache.push(d.data());
        });
    }

    // ===== REAL-TIME CONVERSATIONS =====
    function listenToConversations() {
        if (convsUnsub) convsUnsub();

        const q = query(
            collection(db, "conversations"),
            where("participants", "array-contains", currentUser.uid),
            orderBy("updatedAt", "desc")
        );

        convsUnsub = onSnapshot(q, async (snapshot) => {
            conversationsList.innerHTML = '';

            if (snapshot.empty) {
                conversationsList.innerHTML = `
                    <div style="padding:24px;text-align:center;color:#64748B;font-size:13px;font-weight:300;">
                        <iconify-icon icon="mdi:message-text-outline" style="font-size:36px;opacity:0.3;display:block;margin:0 auto 8px;"></iconify-icon>
                        No conversations yet
                    </div>`;
                return;
            }

            for (const convDoc of snapshot.docs) {
                const conv = convDoc.data();
                const otherId = conv.participants.find(id => id !== currentUser.uid);
                if (!otherId) continue;

                let otherUser = usersCache.find(u => u.uid === otherId);
                if (!otherUser) {
                    const snap = await getDoc(doc(db, "users", otherId));
                    if (snap.exists()) { otherUser = snap.data(); usersCache.push(otherUser); }
                    else continue;
                }

                const item = document.createElement('div');
                item.className = 'chat-item';
                if (convDoc.id === activeChatId) item.classList.add('active');
                item.dataset.convId = convDoc.id;

                const lastMsg = conv.lastMessage || 'Start chatting...';
                const truncated = lastMsg.length > 28 ? lastMsg.substring(0, 28) + '...' : lastMsg;
                const isOnline = otherUser.status === 'online';

                item.innerHTML = `
                    <div class="user-avatar ${isOnline ? 'online' : ''}">${otherUser.displayName.charAt(0).toUpperCase()}</div>
                    <div class="chat-item-info">
                        <p>${otherUser.displayName}</p>
                        <span>${truncated}</span>
                    </div>
                    ${conv.lastMessageSender && conv.lastMessageSender !== currentUser.uid && convDoc.id !== activeChatId ? 
                        '<div class="unread-badge">•</div>' : ''}
                `;

                item.addEventListener('click', () => {
                    openChat(convDoc.id, otherUser);
                    handleMobileSelect();
                });

                conversationsList.appendChild(item);
            }
        });
    }

    // ===== SEARCH =====
    searchInput.addEventListener('input', () => {
        const term = searchInput.value.trim().toLowerCase();
        searchResults.innerHTML = '';
        if (term.length < 2) return;

        const filtered = usersCache.filter(u => 
            u.searchKeywords && u.searchKeywords.some(k => k.includes(term))
        ).slice(0, 6);

        if (filtered.length === 0) {
            searchResults.innerHTML = '<div style="padding:14px;text-align:center;color:#64748B;font-size:13px;">No users found</div>';
            return;
        }

        filtered.forEach(u => {
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.innerHTML = `
                <div class="user-avatar">${u.displayName.charAt(0).toUpperCase()}</div>
                <div class="chat-item-info">
                    <p>${u.displayName}</p>
                    <span>@${u.username}</span>
                </div>
            `;
            div.addEventListener('click', async () => {
                searchInput.value = '';
                searchResults.innerHTML = '';
                await startChat(u);
                handleMobileSelect();
            });
            searchResults.appendChild(div);
        });
    });

    // ===== START CHAT =====
    async function startChat(otherUser) {
        const ids = [currentUser.uid, otherUser.uid].sort();
        const convId = ids.join('_');
        const convRef = doc(db, "conversations", convId);
        const snap = await getDoc(convRef);

        if (!snap.exists()) {
            await setDoc(convRef, {
                participants: [currentUser.uid, otherUser.uid],
                createdAt: serverTimestamp(),
                updatedAt: serverTimestamp(),
                lastMessage: "",
                lastMessageSender: "",
                createdBy: currentUser.uid
            });
        }

        // Add to contacts
        const userRef = doc(db, "users", currentUser.uid);
        await updateDoc(userRef, {
            contacts: arrayUnion({
                uid: otherUser.uid,
                displayName: otherUser.displayName,
                username: otherUser.username,
                lastInteraction: serverTimestamp()
            })
        });

        openChat(convId, otherUser);
    }

    // ===== OPEN CHAT =====
    function openChat(convId, otherUser) {
        if (messagesUnsub) { messagesUnsub(); messagesUnsub = null; }

        activeChatId = convId;
        activeChatUser = otherUser;

        welcomeScreen.style.display = 'none';
        chatScreen.style.display = 'flex';

        document.getElementById('chat-avatar').textContent = otherUser.displayName.charAt(0).toUpperCase();
        document.getElementById('chat-name').textContent = otherUser.displayName;
        
        const statusEl = document.getElementById('chat-status');
        statusEl.textContent = otherUser.status === 'online' ? 'Online' : 'Offline';
        statusEl.className = otherUser.status === 'online' ? '' : 'offline';

        updateActiveState();

        // Messages listener
        const msgsQuery = query(
            collection(db, "conversations", convId, "messages"),
            orderBy("timestamp", "asc")
        );

        messagesUnsub = onSnapshot(msgsQuery, (snap) => {
            messagesContainer.innerHTML = '';

            if (snap.empty) {
                messagesContainer.innerHTML = `
                    <div style="text-align:center;color:#64748B;padding:40px;">
                        <iconify-icon icon="mdi:chat-processing" style="font-size:44px;opacity:0.3;display:block;margin:0 auto 10px;"></iconify-icon>
                        <p style="font-weight:300;">Send a message to start!</p>
                    </div>`;
                return;
            }

            let lastDate = '';
            snap.forEach(doc => {
                const msg = doc.data();
                const isMine = msg.senderId === currentUser.uid;

                if (msg.timestamp) {
                    const d = msg.timestamp.toDate();
                    const dateStr = d.toLocaleDateString();
                    if (dateStr !== lastDate) {
                        lastDate = dateStr;
                        const sep = document.createElement('div');
                        sep.className = 'date-separator';
                        const now = new Date();
                        const yesterday = new Date(now);
                        yesterday.setDate(yesterday.getDate() - 1);
                        
                        if (dateStr === now.toLocaleDateString()) sep.textContent = 'Today';
                        else if (dateStr === yesterday.toLocaleDateString()) sep.textContent = 'Yesterday';
                        else sep.textContent = d.toLocaleDateString([], { weekday: 'long', month: 'short', day: 'numeric' });
                        
                        messagesContainer.appendChild(sep);
                    }
                }

                const el = document.createElement('div');
                el.className = `message ${isMine ? 'sent' : 'received'}`;

                let time = '';
                if (msg.timestamp) {
                    time = msg.timestamp.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                }

                el.innerHTML = `
                    <div class="message-bubble">${escapeHtml(msg.text || '')}</div>
                    <div class="message-time">${time}</div>
                `;
                messagesContainer.appendChild(el);
            });

            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        });

        messageInput.focus();
    }

    function updateActiveState() {
        document.querySelectorAll('#conversations-list .chat-item').forEach(item => {
            item.classList.toggle('active', item.dataset.convId === activeChatId);
        });
    }

    // ===== SEND MESSAGE =====
    async function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;

        if (!activeChatId && activeChatUser) {
            await startChat(activeChatUser);
        }
        if (!activeChatId) return;

        messageInput.value = '';

        try {
            await addDoc(collection(db, "conversations", activeChatId, "messages"), {
                senderId: currentUser.uid,
                text: text,
                timestamp: serverTimestamp(),
                type: "text",
                read: false
            });

            await setDoc(doc(db, "conversations", activeChatId), {
                lastMessage: text,
                lastMessageSender: currentUser.uid,
                updatedAt: serverTimestamp()
            }, { merge: true });

            messageInput.focus();
        } catch (e) {
            console.error(e);
            messageInput.value = text;
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // ===== USER INFO BUTTONS =====
    chatAvatar.addEventListener('click', () => {
        if (activeChatUser) showUserPopup(activeChatUser);
    });

    chatInfoBtn.addEventListener('click', () => {
        if (activeChatUser) showUserPopup(activeChatUser);
    });

    settingsBtn.addEventListener('click', () => {
        if (currentUserData) showUserPopup(currentUserData);
    });

    // ===== LOGOUT =====
    logoutBtn.addEventListener('click', async () => {
        if (!confirm('Are you sure you want to sign out?')) return;
        try {
            if (currentUser) {
                await updateDoc(doc(db, "users", currentUser.uid), { status: "offline", lastLogin: serverTimestamp() });
            }
            await signOut(auth);
            window.location.href = "auth.html";
        } catch (e) { console.error(e); }
    });

    // ===== ONLINE/OFFLINE =====
    window.addEventListener('online', () => {
        if (currentUser) updateDoc(doc(db, "users", currentUser.uid), { status: "online" });
    });
    window.addEventListener('offline', () => {
        if (currentUser) updateDoc(doc(db, "users", currentUser.uid), { status: "offline" });
    });
    window.addEventListener('beforeunload', () => {
        if (currentUser) {
            navigator.sendBeacon('/api/offline', JSON.stringify({ uid: currentUser.uid }));
        }
    });

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    console.log('🚀 NovaChat Ready - Real-time, Responsive, Poppins font');
</script>
</body>
</html>
