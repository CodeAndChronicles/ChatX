<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NovaChat</title>
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0F172A;
            color: #F8FAFC;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            max-width: 100vw;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: 300px;
            min-width: 300px;
            background: #1E293B;
            border-right: 1px solid rgba(124, 58, 237, 0.2);
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: transform 0.3s ease;
            z-index: 100;
        }

        .sidebar-top {
            padding: 20px 16px;
            border-bottom: 1px solid rgba(124, 58, 237, 0.2);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: 700;
            color: #9D5CF6;
            margin-bottom: 16px;
        }

        .logo iconify-icon {
            font-size: 28px;
        }

        .new-chat-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(135deg, #7C3AED, #5B21B6);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .new-chat-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .search-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #0F172A;
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 12px;
            padding: 10px 14px;
            margin: 12px 16px;
        }

        .search-bar iconify-icon {
            color: #9D5CF6;
            font-size: 18px;
            flex-shrink: 0;
        }

        .search-bar input {
            background: transparent;
            border: none;
            outline: none;
            color: #F8FAFC;
            font-size: 14px;
            width: 100%;
        }

        .search-bar input::placeholder {
            color: #64748B;
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            color: #64748B;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 16px 8px;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 8px;
            min-height: 0;
        }

        .chat-list::-webkit-scrollbar {
            width: 4px;
        }

        .chat-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-list::-webkit-scrollbar-thumb {
            background: rgba(124, 58, 237, 0.4);
            border-radius: 4px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 2px;
        }

        .chat-item:hover {
            background: rgba(124, 58, 237, 0.15);
        }

        .chat-item.active {
            background: rgba(124, 58, 237, 0.25);
        }

        .user-avatar {
            width: 42px;
            height: 42px;
            min-width: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7C3AED, #5B21B6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: #fff;
        }

        .chat-item-info {
            flex: 1;
            overflow: hidden;
            min-width: 0;
        }

        .chat-item-info p {
            font-size: 14px;
            font-weight: 600;
            color: #F8FAFC;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-item-info span {
            font-size: 12px;
            color: #64748B;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            margin-top: 2px;
        }

        .sidebar-bottom {
            padding: 16px;
            border-top: 1px solid rgba(124, 58, 237, 0.2);
            background: rgba(15, 23, 42, 0.5);
            margin-top: auto;
        }

        .current-user {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .current-user .user-avatar {
            width: 38px;
            height: 38px;
            min-width: 38px;
            font-size: 14px;
        }

        .user-details {
            flex: 1;
            min-width: 0;
        }

        .user-details p {
            font-size: 13px;
            font-weight: 600;
            color: #F8FAFC;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-details span {
            font-size: 11px;
            color: #34D399;
        }

        .logout-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: #F87171;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(248, 113, 113, 0.2);
            border-color: #F87171;
        }

        .logout-btn iconify-icon {
            font-size: 18px;
        }

        /* Mobile Menu Button */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 200;
            background: #7C3AED;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
        }

        /* Overlay for mobile */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 99;
        }

        .sidebar-overlay.active {
            display: block;
        }

        /* ========== CHAT AREA ========== */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0F172A;
            min-width: 0;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            color: #334155;
            padding: 20px;
            text-align: center;
        }

        .empty-state iconify-icon {
            font-size: clamp(60px, 8vw, 80px);
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: clamp(16px, 3vw, 20px);
            font-weight: 600;
            color: #475569;
        }

        .empty-state p {
            font-size: clamp(12px, 2vw, 14px);
            color: #64748B;
        }

        .chat-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            min-height: 0;
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #1E293B;
            border-bottom: 1px solid rgba(124, 58, 237, 0.2);
            flex-shrink: 0;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .chat-header-left .user-avatar {
            width: 40px;
            height: 40px;
            min-width: 40px;
        }

        .chat-header-info {
            flex: 1;
            min-width: 0;
        }

        .chat-header-info p {
            font-size: 15px;
            font-weight: 700;
            color: #F8FAFC;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-header-info span {
            font-size: 12px;
            color: #34D399;
        }

        .back-btn {
            display: none;
            background: none;
            border: none;
            color: #F8FAFC;
            font-size: 24px;
            cursor: pointer;
            padding: 4px;
            margin-right: 8px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }

        .messages-container::-webkit-scrollbar {
            width: 4px;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(124, 58, 237, 0.3);
            border-radius: 4px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.received {
            align-self: flex-start;
        }

        .message.sent {
            align-self: flex-end;
        }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .message.received .message-bubble {
            background: #1E293B;
            color: #F8FAFC;
            border-bottom-left-radius: 4px;
        }

        .message.sent .message-bubble {
            background: linear-gradient(135deg, #7C3AED, #5B21B6);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            font-size: 11px;
            color: #64748B;
            margin-top: 4px;
            padding: 0 4px;
        }

        .message.sent .message-time {
            text-align: right;
        }

        .message-input-area {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: #1E293B;
            border-top: 1px solid rgba(124, 58, 237, 0.2);
            flex-shrink: 0;
        }

        .message-input-area input {
            flex: 1;
            background: #0F172A;
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 24px;
            padding: 10px 16px;
            color: #F8FAFC;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
            min-width: 0;
        }

        .message-input-area input:focus {
            border-color: #7C3AED;
        }

        .message-input-area input::placeholder {
            color: #475569;
        }

        .send-btn {
            width: 42px;
            height: 42px;
            min-width: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7C3AED, #5B21B6);
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .send-btn:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* ========== USER PANEL ========== */
        .user-panel {
            width: 280px;
            min-width: 280px;
            background: #1E293B;
            border-left: 1px solid rgba(124, 58, 237, 0.2);
            padding: 20px 16px;
            overflow-y: auto;
            transition: transform 0.3s ease;
        }

        .user-panel::-webkit-scrollbar {
            width: 4px;
        }

        .user-panel::-webkit-scrollbar-thumb {
            background: rgba(124, 58, 237, 0.4);
            border-radius: 4px;
        }

        .panel-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(124, 58, 237, 0.2);
            margin-bottom: 12px;
        }

        .panel-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7C3AED, #5B21B6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            border: 3px solid #7C3AED;
            margin-bottom: 10px;
        }

        .panel-header h3 {
            font-size: 16px;
            font-weight: 700;
            color: #F8FAFC;
            margin-bottom: 4px;
        }

        .panel-header p {
            font-size: 12px;
            color: #64748B;
        }

        .panel-section {
            background: #0F172A;
            border-radius: 12px;
            border: 1px solid rgba(124, 58, 237, 0.15);
            margin-bottom: 10px;
            overflow: hidden;
        }

        .panel-section-title {
            padding: 10px 14px;
            font-size: 11px;
            font-weight: 600;
            color: #94A3B8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(124, 58, 237, 0.15);
        }

        .panel-section-content {
            padding: 10px 14px;
            font-size: 13px;
            color: #94A3B8;
            line-height: 1.6;
        }

        .no-selection {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #475569;
            text-align: center;
            padding: 20px;
        }

        .no-selection iconify-icon {
            font-size: 40px;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        .no-selection p {
            font-size: 13px;
        }

        /* ========== RESPONSIVE DESIGN ========== */
        @media (max-width: 1200px) {
            .user-panel {
                width: 250px;
                min-width: 250px;
            }
        }

        @media (max-width: 1024px) {
            .user-panel {
                display: none;
                position: fixed;
                right: 0;
                top: 0;
                bottom: 0;
                z-index: 150;
                transform: translateX(100%);
            }

            .user-panel.mobile-visible {
                display: block;
                transform: translateX(0);
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
                transform: translateX(-100%);
            }

            .sidebar.mobile-visible {
                transform: translateX(0);
            }

            .menu-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .sidebar-overlay.active {
                display: block;
            }

            .chat-header {
                padding-left: 56px;
            }

            .back-btn {
                display: block;
                position: absolute;
                left: 8px;
            }

            .message {
                max-width: 85%;
            }

            .chat-item {
                padding: 8px 10px;
            }

            .user-avatar {
                width: 36px;
                height: 36px;
                min-width: 36px;
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .message {
                max-width: 90%;
            }

            .message-bubble {
                padding: 8px 12px;
                font-size: 13px;
            }

            .message-input-area {
                padding: 8px 10px;
                gap: 6px;
            }

            .message-input-area input {
                padding: 8px 12px;
                font-size: 13px;
            }

            .send-btn {
                width: 38px;
                height: 38px;
                min-width: 38px;
            }

            .sidebar {
                width: 280px;
                min-width: 280px;
            }
        }
    </style>
</head>
<body>

<!-- Mobile Menu Button -->
<button class="menu-toggle" id="menu-toggle">
    <iconify-icon icon="mdi:menu"></iconify-icon>
</button>

<!-- Sidebar Overlay -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">

        <div class="sidebar-top">
            <div class="logo">
                <iconify-icon icon="mdi:chat-processing-outline"></iconify-icon>
                NovaChat
            </div>
            <button class="new-chat-btn" id="new-chat-btn">
                <iconify-icon icon="mdi:plus"></iconify-icon>
                New Chat
            </button>
        </div>

        <div class="search-bar">
            <iconify-icon icon="mdi:magnify"></iconify-icon>
            <input type="text" id="search-input" placeholder="Search users..."/>
        </div>

        <div id="search-results"></div>

        <div class="section-title">Recent Chats</div>
        <div class="chat-list" id="conversations-list"></div>

        <div class="sidebar-bottom">
            <div class="current-user">
                <div class="user-avatar" id="sidebar-avatar">U</div>
                <div class="user-details">
                    <p id="sidebar-name">User</p>
                    <span>Online</span>
                </div>
            </div>
            <button class="logout-btn" id="btn-logout">
                <iconify-icon icon="mdi:logout"></iconify-icon>
                Sign Out
            </button>
        </div>

    </aside>

    <!-- ===== CHAT AREA ===== -->
    <main class="chat-area">

        <div class="empty-state" id="empty-state">
            <iconify-icon icon="mdi:chat-outline"></iconify-icon>
            <h3>Welcome to NovaChat</h3>
            <p>Select a conversation or search for users to start chatting</p>
        </div>

        <div class="chat-view" id="chat-view" style="display: none;">
            <div class="chat-header">
                <button class="back-btn" id="back-btn">
                    <iconify-icon icon="mdi:arrow-left"></iconify-icon>
                </button>
                <div class="chat-header-left">
                    <div class="user-avatar" id="chat-avatar">U</div>
                    <div class="chat-header-info">
                        <p id="chat-name">User</p>
                        <span id="chat-status">offline</span>
                    </div>
                </div>
            </div>

            <div class="messages-container" id="messages-container"></div>

            <div class="message-input-area">
                <input type="text" id="message-input" placeholder="Type a message..."/>
                <button class="send-btn" id="btn-send">
                    <iconify-icon icon="mdi:send"></iconify-icon>
                </button>
            </div>
        </div>

    </main>

    <!-- ===== USER PANEL ===== -->
    <aside class="user-panel" id="user-panel">
        <div class="no-selection" id="panel-empty">
            <iconify-icon icon="mdi:account-circle-outline"></iconify-icon>
            <p>Select a chat to view profile</p>
        </div>

        <div id="panel-content" style="display: none;">
            <div class="panel-header">
                <div class="panel-avatar" id="panel-avatar">U</div>
                <h3 id="panel-name">User</h3>
                <p id="panel-username">@username</p>
            </div>

            <div class="panel-section">
                <div class="panel-section-title">About</div>
                <div class="panel-section-content" id="panel-bio">
                    No bio available
                </div>
            </div>

            <div class="panel-section">
                <div class="panel-section-title">Status</div>
                <div class="panel-section-content" id="panel-status">
                    Offline
                </div>
            </div>
        </div>
    </aside>

</div>

<script type="module">
    // استيراد Firebase config
    import { auth, db } from "./firebase-config.js";
    
    // استيراد دوال Firebase
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { 
        collection, doc, getDoc, getDocs, setDoc, addDoc, 
        query, where, orderBy, onSnapshot, serverTimestamp, limit 
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ===== المتغيرات العامة =====
    let currentUser = null;
    let currentUserData = null;
    let activeConversationId = null;
    let activeOtherUser = null;
    let messagesListener = null;
    let allUsers = [];

    // ===== Mobile Navigation =====
    const menuToggle = document.getElementById('menu-toggle');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebar-overlay');
    const backBtn = document.getElementById('back-btn');
    const userPanel = document.getElementById('user-panel');

    menuToggle.addEventListener('click', () => {
        sidebar.classList.toggle('mobile-visible');
        sidebarOverlay.classList.toggle('active');
    });

    sidebarOverlay.addEventListener('click', () => {
        sidebar.classList.remove('mobile-visible');
        sidebarOverlay.classList.remove('active');
    });

    backBtn.addEventListener('click', () => {
        closeConversation();
    });

    // ===== التحقق من تسجيل الدخول =====
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = "auth.html";
            return;
        }
        
        currentUser = user;
        console.log("✅ User authenticated:", user.uid);
        
        try {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                currentUserData = userDoc.data();
                console.log("✅ User data loaded");
                await loadAllUsers();
                initializeApp();
            } else {
                // إنشاء وثيقة مستخدم إذا لم تكن موجودة
                const userData = {
                    uid: user.uid,
                    email: user.email,
                    displayName: user.displayName || user.email.split('@')[0],
                    username: (user.displayName || user.email.split('@')[0]).toLowerCase().replace(/\s+/g, ''),
                    photoURL: "",
                    theme: "dark",
                    bio: "",
                    status: "online",
                    createdAt: serverTimestamp(),
                    lastLogin: serverTimestamp(),
                    searchKeywords: []
                };
                
                userData.searchKeywords = [
                    userData.username,
                    userData.displayName.toLowerCase()
                ];
                
                await setDoc(doc(db, "users", user.uid), userData);
                currentUserData = userData;
                await loadAllUsers();
                initializeApp();
            }
        } catch (error) {
            console.error("❌ Error loading user:", error);
        }
    });

    // ===== تحميل جميع المستخدمين =====
    async function loadAllUsers() {
        try {
            const snapshot = await getDocs(collection(db, "users"));
            allUsers = [];
            snapshot.forEach(doc => {
                if (doc.data().uid !== currentUser.uid) {
                    allUsers.push(doc.data());
                }
            });
        } catch (error) {
            console.error("Error loading users:", error);
        }
    }

    // ===== تهيئة التطبيق =====
    function initializeApp() {
        document.getElementById('sidebar-name').textContent = currentUserData.displayName || 'User';
        document.getElementById('sidebar-avatar').textContent = 
            (currentUserData.displayName || 'U').charAt(0).toUpperCase();
        
        loadConversations();
        setupSearch();
        setupMessageSending();
        setupLogout();
        setupNewChat();
        
        console.log("🚀 App initialized successfully");
    }

    // ===== زر New Chat =====
    function setupNewChat() {
        document.getElementById('new-chat-btn').addEventListener('click', () => {
            document.getElementById('search-input').focus();
            if (window.innerWidth <= 768) {
                sidebar.classList.add('mobile-visible');
                sidebarOverlay.classList.add('active');
            }
        });
    }

    // ===== تحميل المحادثات =====
    function loadConversations() {
        const conversationsQuery = query(
            collection(db, "conversations"),
            where("participants", "array-contains", currentUser.uid),
            orderBy("updatedAt", "desc")
        );

        onSnapshot(conversationsQuery, async (snapshot) => {
            const conversationsList = document.getElementById('conversations-list');
            
            if (snapshot.empty) {
                conversationsList.innerHTML = `
                    <div style="padding: 20px; text-align: center; color: #64748B; font-size: 13px;">
                        <iconify-icon icon="mdi:chat-plus-outline" style="font-size: 32px; margin-bottom: 8px; display: block; opacity: 0.5;"></iconify-icon>
                        No conversations yet<br>Search for users to start chatting
                    </div>`;
                return;
            }

            // تفريغ القائمة مع الحفاظ على المحادثة النشطة
            const existingItems = {};
            const children = Array.from(conversationsList.children);
            children.forEach(child => {
                if (child.dataset && child.dataset.convId) {
                    existingItems[child.dataset.convId] = child;
                }
            });

            conversationsList.innerHTML = '';

            for (const convDoc of snapshot.docs) {
                const conversation = convDoc.data();
                const otherUserId = conversation.participants.find(id => id !== currentUser.uid);
                
                if (!otherUserId) continue;

                try {
                    const otherUserDoc = await getDoc(doc(db, "users", otherUserId));
                    if (!otherUserDoc.exists()) continue;
                    
                    const otherUser = otherUserDoc.data();
                    
                    const chatItem = document.createElement('div');
                    chatItem.className = 'chat-item';
                    chatItem.dataset.convId = convDoc.id;
                    
                    if (convDoc.id === activeConversationId) {
                        chatItem.classList.add('active');
                    }

                    const lastMessage = conversation.lastMessage || 'Start chatting...';
                    const truncatedMessage = lastMessage.length > 30 ? 
                        lastMessage.substring(0, 30) + '...' : lastMessage;

                    chatItem.innerHTML = `
                        <div class="user-avatar">${(otherUser.displayName || 'U').charAt(0).toUpperCase()}</div>
                        <div class="chat-item-info">
                            <p>${otherUser.displayName || 'Unknown'}</p>
                            <span>${truncatedMessage}</span>
                        </div>
                    `;

                    chatItem.addEventListener('click', () => {
                        openConversation(convDoc.id, otherUser);
                        // إغلاق sidebar على الموبايل
                        if (window.innerWidth <= 768) {
                            sidebar.classList.remove('mobile-visible');
                            sidebarOverlay.classList.remove('active');
                        }
                    });

                    conversationsList.appendChild(chatItem);
                } catch (error) {
                    console.error("Error loading conversation:", error);
                }
            }
        });
    }

    // ===== البحث عن مستخدمين =====
    function setupSearch() {
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');

        searchInput.addEventListener('input', () => {
            const searchTerm = searchInput.value.trim().toLowerCase();
            
            if (!searchTerm || searchTerm.length < 2) {
                searchResults.innerHTML = '';
                return;
            }

            const filteredUsers = allUsers.filter(user => {
                return user.searchKeywords && user.searchKeywords.some(keyword => 
                    keyword.includes(searchTerm)
                );
            });

            searchResults.innerHTML = '';

            if (filteredUsers.length === 0) {
                searchResults.innerHTML = `
                    <div style="padding: 12px; text-align: center; color: #64748B; font-size: 13px;">
                        No users found
                    </div>`;
                return;
            }

            filteredUsers.slice(0, 10).forEach(userData => {
                const userItem = document.createElement('div');
                userItem.className = 'chat-item';
                userItem.innerHTML = `
                    <div class="user-avatar">${(userData.displayName || 'U').charAt(0).toUpperCase()}</div>
                    <div class="chat-item-info">
                        <p>${userData.displayName || 'Unknown'}</p>
                        <span>@${userData.username || 'user'}</span>
                    </div>
                `;

                userItem.addEventListener('click', () => {
                    searchInput.value = '';
                    searchResults.innerHTML = '';
                    startConversation(userData);
                    
                    if (window.innerWidth <= 768) {
                        sidebar.classList.remove('mobile-visible');
                        sidebarOverlay.classList.remove('active');
                    }
                });

                searchResults.appendChild(userItem);
            });
        });
    }

    // ===== بدء محادثة جديدة =====
    async function startConversation(otherUser) {
        try {
            const participants = [currentUser.uid, otherUser.uid].sort();
            const conversationId = participants.join('_');
            const conversationRef = doc(db, "conversations", conversationId);
            const conversationDoc = await getDoc(conversationRef);

            if (!conversationDoc.exists()) {
                await setDoc(conversationRef, {
                    participants: [currentUser.uid, otherUser.uid],
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp(),
                    lastMessage: "",
                    lastMessageSender: ""
                });
                console.log("✅ New conversation created");
            }

            openConversation(conversationId, otherUser);
        } catch (error) {
            console.error("Error starting conversation:", error);
        }
    }

    // ===== فتح محادثة =====
    function openConversation(conversationId, otherUser) {
        activeConversationId = conversationId;
        activeOtherUser = otherUser;

        // إلغاء مستمع الرسائل السابق
        if (messagesListener) {
            messagesListener();
            messagesListener = null;
        }

        // إظهار واجهة المحادثة
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('chat-view').style.display = 'flex';
        document.getElementById('panel-empty').style.display = 'none';
        document.getElementById('panel-content').style.display = 'block';

        // تحديث رأس المحادثة
        document.getElementById('chat-name').textContent = otherUser.displayName || 'Unknown';
        document.getElementById('chat-status').textContent = otherUser.status || 'offline';
        document.getElementById('chat-avatar').textContent = 
            (otherUser.displayName || 'U').charAt(0).toUpperCase();

        // تحديث اللوحة الجانبية
        updateUserPanel(otherUser);

        // تحميل الرسائل
        loadMessages(conversationId);

        // إظهار user panel على الموبايل إذا كان مخفي
        if (window.innerWidth <= 1024) {
            userPanel.classList.add('mobile-visible');
        }

        // تحديث active state في القائمة
        document.querySelectorAll('.chat-item').forEach(item => {
            item.classList.remove('active');
            if (item.dataset.convId === conversationId) {
                item.classList.add('active');
            }
        });

        // تركيز على input
        setTimeout(() => {
            document.getElementById('message-input').focus();
        }, 100);
    }

    // ===== إغلاق المحادثة =====
    function closeConversation() {
        activeConversationId = null;
        activeOtherUser = null;

        if (messagesListener) {
            messagesListener();
            messagesListener = null;
        }

        document.getElementById('empty-state').style.display = 'flex';
        document.getElementById('chat-view').style.display = 'none';
        document.getElementById('panel-content').style.display = 'none';
        document.getElementById('panel-empty').style.display = 'flex';

        if (window.innerWidth <= 1024) {
            userPanel.classList.remove('mobile-visible');
        }

        document.querySelectorAll('.chat-item').forEach(item => {
            item.classList.remove('active');
        });
    }

    // ===== تحديث اللوحة الجانبية =====
    function updateUserPanel(otherUser) {
        document.getElementById('panel-name').textContent = otherUser.displayName || 'Unknown';
        document.getElementById('panel-username').textContent = '@' + (otherUser.username || 'user');
        document.getElementById('panel-avatar').textContent = 
            (otherUser.displayName || 'U').charAt(0).toUpperCase();
        document.getElementById('panel-bio').textContent = otherUser.bio || 'No bio available';
        document.getElementById('panel-status').textContent = otherUser.status || 'offline';
    }

    // ===== تحميل الرسائل =====
    function loadMessages(conversationId) {
        const messagesQuery = query(
            collection(db, "conversations", conversationId, "messages"),
            orderBy("timestamp", "asc")
        );

        const messagesContainer = document.getElementById('messages-container');

        messagesListener = onSnapshot(messagesQuery, (snapshot) => {
            messagesContainer.innerHTML = '';

            if (snapshot.empty) {
                messagesContainer.innerHTML = `
                    <div style="text-align: center; color: #64748B; padding: 40px 20px;">
                        <iconify-icon icon="mdi:chat-processing-outline" style="font-size: 48px; margin-bottom: 12px; display: block; opacity: 0.5;"></iconify-icon>
                        <p style="font-size: 14px;">No messages yet</p>
                        <p style="font-size: 12px; margin-top: 4px;">Send a message to start the conversation!</p>
                    </div>`;
                return;
            }

            snapshot.forEach(messageDoc => {
                const message = messageDoc.data();
                const isSentByMe = message.senderId === currentUser.uid;

                const messageElement = document.createElement('div');
                messageElement.className = `message ${isSentByMe ? 'sent' : 'received'}`;

                let timeString = '';
                if (message.timestamp) {
                    const date = message.timestamp.toDate();
                    const now = new Date();
                    const isToday = date.toDateString() === now.toDateString();
                    
                    if (isToday) {
                        timeString = date.toLocaleTimeString([], { 
                            hour: '2-digit', 
                            minute: '2-digit' 
                        });
                    } else {
                        timeString = date.toLocaleDateString([], { 
                            month: 'short', 
                            day: 'numeric' 
                        }) + ' ' + date.toLocaleTimeString([], { 
                            hour: '2-digit', 
                            minute: '2-digit' 
                        });
                    }
                }

                messageElement.innerHTML = `
                    <div class="message-bubble">${escapeHtml(message.text || '')}</div>
                    <div class="message-time">${timeString}</div>
                `;

                messagesContainer.appendChild(messageElement);
            });

            // التمرير التلقائي للأسفل
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        });
    }

    // ===== إرسال الرسائل =====
    function setupMessageSending() {
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('btn-send');

        async function sendMessage() {
            const text = messageInput.value.trim();
            
            if (!text) return;

            messageInput.value = '';

            // إذا لم تكن هناك محادثة نشطة، أنشئ واحدة مع آخر مستخدم تم البحث عنه
            if (!activeConversationId) {
                if (activeOtherUser) {
                    await startConversation(activeOtherUser);
                } else {
                    // إذا لم يكن هناك مستخدم محدد، لا تفعل شيئاً
                    messageInput.value = text; // استعادة النص
                    return;
                }
            }

            try {
                const messagesRef = collection(db, "conversations", activeConversationId, "messages");
                await addDoc(messagesRef, {
                    senderId: currentUser.uid,
                    text: text,
                    timestamp: serverTimestamp(),
                    type: "text",
                    read: false
                });

                const conversationRef = doc(db, "conversations", activeConversationId);
                await setDoc(conversationRef, {
                    lastMessage: text,
                    lastMessageSender: currentUser.uid,
                    updatedAt: serverTimestamp()
                }, { merge: true });

                console.log("✅ Message sent");
                messageInput.focus();
            } catch (error) {
                console.error("❌ Error sending message:", error);
                messageInput.value = text; // استعادة النص في حالة الخطأ
            }
        }

        sendButton.addEventListener('click', sendMessage);

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // دعم الإرسال من أجهزة الموبايل
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    }

    // ===== تسجيل الخروج =====
    function setupLogout() {
        const logoutButton = document.getElementById('btn-logout');
        
        logoutButton.addEventListener('click', async () => {
            if (confirm('Are you sure you want to sign out?')) {
                try {
                    if (currentUser) {
                        const userRef = doc(db, "users", currentUser.uid);
                        await setDoc(userRef, { 
                            status: "offline",
                            lastLogin: serverTimestamp()
                        }, { merge: true });
                    }
                    
                    await signOut(auth);
                    console.log("✅ Signed out successfully");
                    window.location.href = "auth.html";
                } catch (error) {
                    console.error("❌ Error signing out:", error);
                    alert("Failed to sign out. Please try again.");
                }
            }
        });
    }

    // ===== وظائف مساعدة =====
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ===== تحديث حالة الاتصال =====
    window.addEventListener('online', () => {
        if (currentUser) {
            setDoc(doc(db, "users", currentUser.uid), { 
                status: "online" 
            }, { merge: true });
        }
    });

    window.addEventListener('offline', () => {
        if (currentUser) {
            setDoc(doc(db, "users", currentUser.uid), { 
                status: "offline" 
            }, { merge: true });
        }
    });

    // ===== تحديث حالة المستخدم عند إغلاق الصفحة =====
    window.addEventListener('beforeunload', () => {
        if (currentUser) {
            navigator.sendBeacon('/api/offline', JSON.stringify({ uid: currentUser.uid }));
        }
    });

    console.log("🎨 NovaChat responsive design ready");
</script>

</body>
