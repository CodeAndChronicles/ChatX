</div>

<div class="bottom-nav" id="bottom-nav">
    <button class="nav-item active" id="nav-chats" data-nav="chats">
        <iconify-icon icon="mdi:chat"></iconify-icon>
        <span>Chats</span>
    </button>
    <button class="nav-item" id="nav-settings" data-nav="settings">
        <iconify-icon icon="mdi:cog"></iconify-icon>
        <span>Settings</span>
    </button>
</div>

<script type="module">
    import { auth, db, rtdb } from "./firebase-config.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { 
        collection, doc, getDoc, getDocs, setDoc, addDoc, 
        query, where, orderBy, onSnapshot, serverTimestamp,
        updateDoc, deleteDoc, increment, limit, writeBatch
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { 
        ref, set, onValue, onDisconnect, off,
        serverTimestamp as rtServerTimestamp 
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // ========== STATE ==========
    let currentUser = null;
    let currentUserData = null;
    let activeChatId = null;
    let activeChatUser = null;
    let currentUnsubscribes = {
        messages: null,
        typing: null,
        status: null
    };
    let conversationsUnsubscribe = null;
    let typingTimeout = null;
    let lastMessageTime = 0;
    let searchTimer = null;
    let statusUnsubscribes = new Map();
    let typingUnsubscribes = new Map();
    
    const SPAM_COOLDOWN = 1000;
    const EDIT_WINDOW = 15 * 60 * 1000;
    let editingMessageId = null;
    let replyingTo = null;

    // ========== DOM Elements ==========
    const $ = (id) => document.getElementById(id);
    const sidebar = $('sidebar');
    const overlay = $('sidebar-overlay');
    const welcomeScreen = $('welcome-screen');
    const chatScreen = $('chat-screen');
    const searchInput = $('search-input');
    const searchResults = $('search-results');
    const conversationsList = $('conversations-list');
    const messagesContainer = $('messages-container');
    const messageInput = $('message-input');
    const sendBtn = $('send-btn');
    const charCounter = $('char-counter');
    const MAX_CHARS = 500;

    // ========== Helper Functions ==========
    function formatShortTime(date) {
        if (!date) return '';
        const now = new Date();
        const diff = (now - date) / 1000;
        if (diff < 60) return 'now';
        if (diff < 3600) return Math.floor(diff / 60) + 'm';
        if (date.toDateString() === now.toDateString()) {
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        const yesterday = new Date(now);
        yesterday.setDate(yesterday.getDate() - 1);
        if (date.toDateString() === yesterday.toDateString()) return 'Yesterday';
        return date.toLocaleDateString([], { day: 'numeric', month: 'short' });
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function closeSidebarMobile() {
        sidebar.classList.remove('open');
        overlay.classList.remove('show');
    }

    function showModal(modal) { modal.classList.add('show'); }
    function hideModal(modal) { modal.classList.remove('show'); }

    // ========== Safe Unsubscribe Functions ==========
    function safeUnsubscribe(fn) {
        if (fn && typeof fn === 'function') {
            try {
                fn();
            } catch(e) {
                console.warn('Error in unsubscribe:', e);
            }
        }
    }

    function safeOff(ref) {
        if (ref && typeof ref === 'object' && ref._key) {
            try {
                off(ref);
            } catch(e) {
                console.warn('Error in off():', e);
            }
        }
    }

    // ========== Presence System (RTDB) ==========
    async function setUserStatus(userId, status) {
        if (!userId) return;
        const statusRef = ref(rtdb, `presence/${userId}`);
        
        if (status === 'online') {
            onDisconnect(statusRef).set({
                state: 'offline',
                lastSeen: rtServerTimestamp()
            });
            await set(statusRef, {
                state: 'online',
                lastSeen: rtServerTimestamp()
            });
        } else {
            await set(statusRef, {
                state: 'offline',
                lastSeen: rtServerTimestamp()
            });
        }
    }

    function watchUserStatus(userId, callback) {
        if (!userId) {
            console.warn('watchUserStatus: userId is undefined');
            return () => {};
        }
        
        if (statusUnsubscribes.has(userId)) {
            const oldUnsub = statusUnsubscribes.get(userId);
            safeUnsubscribe(oldUnsub);
            statusUnsubscribes.delete(userId);
        }
        
        const statusRef = ref(rtdb, `presence/${userId}`);
        
        const unsubscribe = onValue(statusRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                callback({
                    isOnline: data.state === 'online',
                    lastSeen: data.lastSeen
                });
            } else {
                callback({ isOnline: false, lastSeen: null });
            }
        }, (error) => {
            console.error('Error watching user status:', error);
            callback({ isOnline: false, lastSeen: null });
        });
        
        statusUnsubscribes.set(userId, unsubscribe);
        return unsubscribe;
    }

    // ========== Typing System (RTDB) ==========
    function sendTyping(conversationId, userId, isTyping) {
        if (!conversationId || !userId) return;
        
        const typingRef = ref(rtdb, `typing/${conversationId}/${userId}`);
        if (isTyping) {
            set(typingRef, { isTyping: true, timestamp: Date.now() });
            if (typingTimeout) clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                set(typingRef, null);
            }, 3000);
        } else {
            set(typingRef, null);
            if (typingTimeout) clearTimeout(typingTimeout);
        }
    }

    function watchTyping(conversationId, userId, callback) {
        if (!conversationId || !userId) {
            console.warn('watchTyping: conversationId or userId is undefined');
            return () => {};
        }
        
        const key = `${conversationId}_${userId}`;
        
        if (typingUnsubscribes.has(key)) {
            const oldUnsub = typingUnsubscribes.get(key);
            safeUnsubscribe(oldUnsub);
            typingUnsubscribes.delete(key);
        }
        
        const typingRef = ref(rtdb, `typing/${conversationId}/${userId}`);
        
        const unsubscribe = onValue(typingRef, (snapshot) => {
            const data = snapshot.val();
            callback(data && data.isTyping === true);
        }, (error) => {
            console.error('Error watching typing:', error);
            callback(false);
        });
        
        typingUnsubscribes.set(key, unsubscribe);
        return unsubscribe;
    }

    // ========== Mark Messages as Seen ==========
    async function markConversationSeen(convId) {
        if (!convId || !currentUser) return;
        
        try {
            const convRef = doc(db, "conversations", convId);
            await updateDoc(convRef, { [`unread.${currentUser.uid}`]: 0 });
            
            const q = query(
                collection(db, "conversations", convId, "messages"),
                where("seen", "==", false),
                where("senderId", "!=", currentUser.uid),
                limit(50)
            );
            const snap = await getDocs(q);
            if (snap.empty) return;
            
            const batch = writeBatch(db);
            snap.forEach(d => batch.update(d.ref, { seen: true, seenAt: serverTimestamp() }));
            await batch.commit();
        } catch(e) {
            console.warn('Error marking conversation seen:', e);
        }
    }

    // ========== Scroll to Message ==========
    function scrollToMessage(msgId) {
        const target = document.querySelector(`[data-msg-id="${msgId}"]`);
        if (target) {
            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            target.style.backgroundColor = 'rgba(124, 58, 237, 0.2)';
            setTimeout(() => {
                target.style.backgroundColor = '';
            }, 1500);
        }
    }

    // ========== Update Send Button ==========
    function updateSendButton() {
        if (sendBtn) sendBtn.disabled = messageInput.value.trim().length === 0;
    }

    function updateCharCounter() {
        const len = messageInput.value.length;
        if (len > MAX_CHARS - 50) {
            charCounter.style.display = 'block';
            charCounter.textContent = `${len}/${MAX_CHARS}`;
            charCounter.style.color = len > MAX_CHARS ? 'var(--danger)' : 'var(--text-muted)';
            if (len > MAX_CHARS) {
                messageInput.value = messageInput.value.substring(0, MAX_CHARS);
            }
        } else {
            charCounter.style.display = 'none';
        }
        updateSendButton();
    }

    if (messageInput) {
        messageInput.addEventListener('input', updateCharCounter);
        messageInput.addEventListener('input', updateSendButton);
        updateSendButton();
    }

    // ========== Theme ==========
    const savedTheme = localStorage.getItem('nova-theme') || 'dark';
    if (savedTheme === 'light') document.body.classList.add('light-theme');
    
    const themeBtn = $('theme-btn');
    if (themeBtn) {
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('light-theme');
            localStorage.setItem('nova-theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
        });
    }

    // ========== Mobile Navigation ==========
    const menuBtn = $('menu-btn');
    if (menuBtn) {
        menuBtn.addEventListener('click', () => {
            sidebar.classList.add('open');
            overlay.classList.add('show');
        });
    }
    
    if (overlay) {
        overlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('show');
        });
    }
    
    const backBtn = $('back-btn');
    if (backBtn) backBtn.addEventListener('click', closeChat);

    const settingsBtn = $('settings-btn');
    if (settingsBtn) {
        settingsBtn.addEventListener('click', () => {
            window.location.href = "settings.html";
        });
    }
    
    const navSettings = $('nav-settings');
    if (navSettings) {
        navSettings.addEventListener('click', () => {
            window.location.href = "settings.html";
        });
    }
    
    const navChats = $('nav-chats');
    if (navChats) {
        navChats.addEventListener('click', () => {
            if (window.innerWidth <= 768) {
                sidebar.classList.add('open');
                overlay.classList.add('show');
            }
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            navChats.classList.add('active');
        });
    }

    // ========== Modals ==========
    const userModal = $('user-modal');
    const editModal = $('edit-modal');
    const editMsgModal = $('edit-msg-modal');
    
    if (userModal) userModal.addEventListener('click', (e) => { if (e.target === userModal) hideModal(userModal); });
    if (editModal) editModal.addEventListener('click', (e) => { if (e.target === editModal) hideModal(editModal); });
    if (editMsgModal) editMsgModal.addEventListener('click', (e) => { if (e.target === editMsgModal) hideModal(editMsgModal); });

    // ========== Authentication ==========
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = "auth.html";
            return;
        }
        currentUser = user;
        
        const userRef = doc(db, "users", user.uid);
        const snap = await getDoc(userRef);
        
        if (snap.exists()) {
            currentUserData = snap.data();
        } else {
            currentUserData = {
                uid: user.uid,
                email: user.email || '',
                displayName: user.displayName || user.email?.split('@')[0] || 'User',
                username: (user.displayName || user.email?.split('@')[0] || 'user').toLowerCase().replace(/\s+/g, ''),
                bio: "",
                searchKeywords: [],
                pinnedChats: []
            };
            currentUserData.searchKeywords = [currentUserData.username, currentUserData.displayName.toLowerCase()];
            await setDoc(userRef, currentUserData);
        }

        await setUserStatus(currentUser.uid, 'online');
        updateSelfUI();
        listenToConversations();
        
        if (Notification.permission === 'default') {
            Notification.requestPermission();
        }
    });

    function updateSelfUI() {
        const selfName = $('self-name');
        const selfAvatar = $('self-avatar');
        const editAvatar = $('edit-avatar');
        const editUsernameDisplay = $('edit-username-display');
        const editName = $('edit-name');
        const editBio = $('edit-bio');
        
        if (selfName) selfName.textContent = currentUserData.displayName;
        if (selfAvatar) selfAvatar.textContent = currentUserData.displayName.charAt(0).toUpperCase();
        if (editAvatar) editAvatar.textContent = currentUserData.displayName.charAt(0).toUpperCase();
        if (editUsernameDisplay) editUsernameDisplay.textContent = '@' + currentUserData.username;
        if (editName) editName.value = currentUserData.displayName || '';
        if (editBio) editBio.value = currentUserData.bio || '';
    }

    // ========== Search Users ==========
    function displaySearchResults(results) {
        if (!searchResults) return;
        searchResults.innerHTML = '';
        if (results.length === 0) {
            searchResults.innerHTML = '<div style="padding:14px;text-align:center;color:var(--text-muted);font-size:13px;">No users found</div>';
            return;
        }
        
        results.forEach(u => {
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.innerHTML = `
                <div class="avatar sm">${u.displayName.charAt(0).toUpperCase()}</div>
                <div class="chat-info">
                    <div class="name">${escapeHtml(u.displayName)}</div>
                    <div class="preview">@${u.username}</div>
                </div>
            `;
            div.addEventListener('click', async () => {
                if (searchInput) searchInput.value = '';
                if (searchResults) searchResults.innerHTML = '';
                await startChat(u);
                if (window.innerWidth <= 768) closeSidebarMobile();
            });
            searchResults.appendChild(div);
        });
    }

    if (searchInput) {
        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimer);
            const term = searchInput.value.trim().toLowerCase();
            if (!term || term.length < 2) {
                if (searchResults) searchResults.innerHTML = '';
                return;
            }
            
            searchTimer = setTimeout(async () => {
                try {
                    const q = query(
                        collection(db, 'users'),
                        where('searchKeywords', 'array-contains', term),
                        limit(10)
                    );
                    const snap = await getDocs(q);
                    const results = [];
                    snap.forEach(d => {
                        if (d.data().uid !== currentUser.uid) results.push(d.data());
                    });
                    displaySearchResults(results);
                } catch (e) {
                    console.error("Search error:", e);
                }
            }, 350);
        });
    }

    // ========== Conversations List ==========
    function listenToConversations() {
        if (conversationsUnsubscribe) {
            safeUnsubscribe(conversationsUnsubscribe);
            conversationsUnsubscribe = null;
        }

        const q = query(
            collection(db, "conversations"),
            where("participants", "array-contains", currentUser.uid),
            orderBy("updatedAt", "desc")
        );

        conversationsUnsubscribe = onSnapshot(q, async (snapshot) => {
            if (!conversationsList) return;
            
            const docs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            const pinned = docs.filter(d => currentUserData.pinnedChats?.includes(d.id));
            const unpinned = docs.filter(d => !currentUserData.pinnedChats?.includes(d.id));
            
            conversationsList.innerHTML = '';
            
            if (docs.length === 0) {
                conversationsList.innerHTML = `<div style="padding:24px;text-align:center;color:var(--text-muted);font-size:13px;">
                    <iconify-icon icon="mdi:message-text-outline" style="font-size:36px;opacity:0.3;display:block;margin:0 auto 8px;"></iconify-icon>
                    No conversations yet
                </div>`;
                return;
            }

            for (const conv of [...pinned, ...unpinned]) {
                const otherId = conv.participants.find(id => id !== currentUser.uid);
                if (!otherId) continue;

                const userRef = doc(db, "users", otherId);
                const userSnap = await getDoc(userRef);
                if (!userSnap.exists()) continue;
                const otherUser = userSnap.data();

                const item = document.createElement('div');
                item.className = `chat-item ${conv.id === activeChatId ? 'active' : ''}`;
                if (currentUserData.pinnedChats?.includes(conv.id)) item.classList.add('pinned');
                item.dataset.convId = conv.id;

                const lastMsg = conv.lastMessage || 'Start chatting...';
                const truncated = lastMsg.length > 25 ? lastMsg.substring(0, 25) + '...' : lastMsg;
                const lastTime = conv.updatedAt?.toDate ? formatShortTime(conv.updatedAt.toDate()) : '';
                const unreadCount = conv.unread?.[currentUser.uid] || 0;

                let isOnline = false;
                const statusUnsub = watchUserStatus(otherId, (status) => {
                    isOnline = status.isOnline;
                    const avatarDiv = item.querySelector('.avatar');
                    if (avatarDiv) {
                        if (isOnline) avatarDiv.classList.add('online');
                        else avatarDiv.classList.remove('online');
                    }
                });

                let isTyping = false;
                const typingUnsub = watchTyping(conv.id, otherId, (typing) => {
                    isTyping = typing;
                    const previewDiv = item.querySelector('.preview');
                    if (previewDiv) {
                        if (isTyping) {
                            previewDiv.textContent = 'typing...';
                            previewDiv.classList.add('typing');
                        } else {
                            previewDiv.textContent = truncated;
                            previewDiv.classList.remove('typing');
                        }
                    }
                });

                item.innerHTML = `
                    <div class="avatar ${isOnline ? 'online' : ''}">${otherUser.displayName.charAt(0).toUpperCase()}</div>
                    <div class="chat-info">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <div class="name">${currentUserData.pinnedChats?.includes(conv.id) ? '<iconify-icon icon="mdi:pin" class="pin-icon"></iconify-icon> ' : ''}${escapeHtml(otherUser.displayName)}</div>
                            <div style="font-size:10px;color:var(--text-muted);flex-shrink:0;">${lastTime}</div>
                        </div>
                        <div class="preview ${isTyping ? 'typing' : ''}">${isTyping ? 'typing...' : escapeHtml(truncated)}</div>
                    </div>
                    ${unreadCount > 0 && conv.id !== activeChatId ? `<div class="unread-badge">${unreadCount > 99 ? '99+' : unreadCount}</div>` : ''}
                `;

                item.addEventListener('click', () => {
                    safeUnsubscribe(statusUnsub);
                    safeUnsubscribe(typingUnsub);
                    openChat(conv.id, otherUser);
                    if (window.innerWidth <= 768) closeSidebarMobile();
                });

                conversationsList.appendChild(item);
            }
        }, (error) => {
            console.error("Conversations error:", error);
        });
    }

    // ========== Pin Chat ==========
    async function togglePinChat(convId) {
        const pinned = currentUserData.pinnedChats || [];
        const index = pinned.indexOf(convId);
        if (index > -1) pinned.splice(index, 1);
        else pinned.unshift(convId);
        await updateDoc(doc(db, "users", currentUser.uid), { pinnedChats: pinned });
        currentUserData.pinnedChats = pinned;
    }

    const pinChatBtn = $('pin-chat-btn');
    if (pinChatBtn) {
        pinChatBtn.addEventListener('click', async () => {
            if (activeChatId) {
                await togglePinChat(activeChatId);
                const icon = pinChatBtn.querySelector('iconify-icon');
                const isPinned = currentUserData.pinnedChats?.includes(activeChatId);
                if (icon) icon.setAttribute('icon', isPinned ? 'mdi:pin' : 'mdi:pin-outline');
            }
        });
    }

    // ========== Start Chat ==========
    async function startChat(otherUser) {
        const ids = [currentUser.uid, otherUser.uid].sort();
        const convId = ids.join('_');
        const convRef = doc(db, "conversations", convId);
        const snap = await getDoc(convRef);

        if (!snap.exists()) {
            await setDoc(convRef, {
                participants: [currentUser.uid, otherUser.uid],
                createdAt: serverTimestamp(),
                updatedAt: serverTimestamp(),
                lastMessage: "",
                lastMessageSender: "",
                unread: { [currentUser.uid]: 0, [otherUser.uid]: 0 }
            });
        }

        openChat(convId, otherUser);
    }

    // ========== Create Message Element ==========
    function createMessageElement(msgDoc, msg, isMine, otherUser) {
        const el = document.createElement('div');
        el.className = `msg ${isMine ? 'out' : 'in'}`;
        el.dataset.msgId = msgDoc.id;

        let time = '';
        if (msg.timestamp) {
            time = msg.timestamp.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        let statusIcon = '';
        if (isMine) {
            if (msg.seen) statusIcon = '<iconify-icon icon="mdi:check-all" class="msg-status seen"></iconify-icon>';
            else if (msg.delivered) statusIcon = '<iconify-icon icon="mdi:check-all" class="msg-status delivered"></iconify-icon>';
            else statusIcon = '<iconify-icon icon="mdi:check" class="msg-status sent"></iconify-icon>';
        }

        let reactionsHtml = '';
        if (msg.reactions && Object.keys(msg.reactions).length > 0) {
            reactionsHtml = '<div class="msg-reactions">';
            for (const [emoji, users] of Object.entries(msg.reactions)) {
                reactionsHtml += `<span onclick="window.addReaction('${msgDoc.id}', '${emoji}')" title="${users.join(', ')}">${emoji} ${users.length}</span>`;
            }
            reactionsHtml += '</div>';
        }

        let quoteHtml = '';
        if (msg.replyTo) {
            quoteHtml = `<div class="quote" data-quote-id="${msg.replyTo.id}">
                <iconify-icon icon="mdi:reply" style="font-size:10px;"></iconify-icon>
                ${escapeHtml(msg.replyTo.senderName)}: ${escapeHtml(msg.replyTo.text.substring(0, 50))}${msg.replyTo.text.length > 50 ? '...' : ''}
            </div>`;
        }

        el.innerHTML = `
            <div class="msg-bubble">
                ${quoteHtml}
                ${escapeHtml(msg.text || '')}
                ${msg.edited ? '<div class="msg-edited">edited</div>' : ''}
            </div>
            ${reactionsHtml}
            <div class="msg-time">
                ${time}
                ${statusIcon}
            </div>
        `;

        const quoteDiv = el.querySelector('.quote');
        if (quoteDiv && msg.replyTo?.id) {
            quoteDiv.addEventListener('click', () => scrollToMessage(msg.replyTo.id));
        }

        el.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            showContextMenu(e, msgDoc.id, msg.text, isMine, msg.timestamp?.toDate?.()?.getTime());
        });
        
        let pressTimer;
        el.addEventListener('touchstart', (e) => {
            pressTimer = setTimeout(() => {
                showContextMenu(e, msgDoc.id, msg.text, isMine, msg.timestamp?.toDate?.()?.getTime());
            }, 500);
        });
        el.addEventListener('touchend', () => clearTimeout(pressTimer));
        el.addEventListener('touchmove', () => clearTimeout(pressTimer));

        let touchStartX = 0;
        el.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        }, { passive: true });
        el.addEventListener('touchend', (e) => {
            const diff = e.changedTouches[0].clientX - touchStartX;
            if (diff > 60 && !isMine) {
                el.style.transform = 'translateX(8px)';
                setTimeout(() => { el.style.transform = ''; }, 150);
                replyingTo = { id: msgDoc.id, text: msg.text, senderName: isMine ? 'You' : otherUser.displayName };
                const replyWho = $('reply-who');
                const replyWhat = $('reply-what');
                const replyBar = $('reply-bar');
                if (replyWho) replyWho.textContent = `Replying to ${replyingTo.senderName}`;
                if (replyWhat) replyWhat.textContent = msg.text.length > 60 ? msg.text.substring(0, 60) + '...' : msg.text;
                if (replyBar) replyBar.style.display = 'flex';
                if (messageInput) messageInput.focus();
            }
        }, { passive: true });

        el.addEventListener('dblclick', () => {
            window.addReaction(msgDoc.id, '❤️');
        });

        return el;
    }

    // ========== Open Chat ==========
    function openChat(convId, otherUser) {
        if (!convId || !otherUser || !otherUser.uid) {
            console.error('openChat: invalid parameters', { convId, otherUser });
            return;
        }
        
        if (currentUnsubscribes.messages) safeUnsubscribe(currentUnsubscribes.messages);
        if (currentUnsubscribes.typing) safeUnsubscribe(currentUnsubscribes.typing);
        if (currentUnsubscribes.status) safeUnsubscribe(currentUnsubscribes.status);
        
        activeChatId = convId;
        activeChatUser = otherUser;
        
        document.body.classList.add('chat-open');

        if (welcomeScreen) welcomeScreen.style.display = 'none';
        if (chatScreen) chatScreen.style.display = 'flex';
        if (messagesContainer) messagesContainer.innerHTML = '';

        const chatAvatar = $('chat-avatar');
        const chatName = $('chat-name');
        
        if (chatAvatar) chatAvatar.textContent = otherUser.displayName.charAt(0).toUpperCase();
        if (chatName) chatName.textContent = otherUser.displayName;
        
        if (otherUser.uid) {
            currentUnsubscribes.status = watchUserStatus(otherUser.uid, (status) => {
                const statusEl = $('chat-status');
                if (!statusEl) return;
                if (status.isOnline) {
                    statusEl.textContent = 'Online';
                    statusEl.className = 'status-text online';
                } else {
                    statusEl.textContent = 'Offline';
                    statusEl.className = 'status-text offline';
                }
            });
        }

        if (convId && otherUser.uid) {
            currentUnsubscribes.typing = watchTyping(convId, otherUser.uid, (isTyping) => {
                const statusEl = $('chat-status');
                if (!statusEl) return;
                if (isTyping) {
                    statusEl.textContent = 'typing...';
                    statusEl.className = 'status-text typing';
                } else {
                    const isOnline = statusEl.classList.contains('online');
                    statusEl.textContent = isOnline ? 'Online' : 'Offline';
                    statusEl.className = `status-text ${isOnline ? 'online' : 'offline'}`;
                }
            });
        }

        const draft = localStorage.getItem(`draft_${convId}`);
        if (messageInput) messageInput.value = draft || '';
        if (messageInput) messageInput.focus();
        updateSendButton();
        updateCharCounter();

        document.querySelectorAll('#conversations-list .chat-item').forEach(item => {
            item.classList.toggle('active', item.dataset.convId === convId);
        });

        const isPinned = currentUserData.pinnedChats?.includes(convId);
        const pinIcon = pinChatBtn?.querySelector('iconify-icon');
        if (pinIcon) pinIcon.setAttribute('icon', isPinned ? 'mdi:pin' : 'mdi:pin-outline');

        const msgsQuery = query(
            collection(db, "conversations", convId, "messages"),
            orderBy("timestamp", "asc")
        );

        let lastDate = '';
        let messageElements = new Map();

        currentUnsubscribes.messages = onSnapshot(msgsQuery, async (snapshot) => {
            await markConversationSeen(convId);
            
            snapshot.docChanges().forEach((change) => {
                const msgDoc = change.doc;
                const msg = msgDoc.data();
                const isMine = msg.senderId === currentUser.uid;
                
                if (change.type === 'added') {
                    const msgDate = msg.timestamp?.toDate();
                    const dateStr = msgDate ? msgDate.toLocaleDateString() : '';
                    
                    if (dateStr && dateStr !== lastDate && messagesContainer) {
                        lastDate = dateStr;
                        const divider = document.createElement('div');
                        divider.className = 'date-divider';
                        const now = new Date();
                        const yesterday = new Date(now);
                        yesterday.setDate(yesterday.getDate() - 1);
                        if (dateStr === now.toLocaleDateString()) divider.textContent = 'Today';
                        else if (dateStr === yesterday.toLocaleDateString()) divider.textContent = 'Yesterday';
                        else divider.textContent = msgDate.toLocaleDateString([], { weekday: 'long', month: 'short', day: 'numeric' });
                        messagesContainer.appendChild(divider);
                    }
                    
                    const msgElement = createMessageElement(msgDoc, msg, isMine, otherUser);
                    messageElements.set(msgDoc.id, msgElement);
                    if (messagesContainer) messagesContainer.appendChild(msgElement);
                    
                } else if (change.type === 'modified') {
                    const existingElement = messageElements.get(msgDoc.id);
                    if (existingElement) {
                        const newElement = createMessageElement(msgDoc, msg, isMine, otherUser);
                        existingElement.replaceWith(newElement);
                        messageElements.set(msgDoc.id, newElement);
                    }
                    
                } else if (change.type === 'removed') {
                    const existingElement = messageElements.get(msgDoc.id);
                    if (existingElement) {
                        existingElement.remove();
                        messageElements.delete(msgDoc.id);
                    }
                }
            });
            
            if (messagesContainer) messagesContainer.scrollTop = messagesContainer.scrollHeight;
        });
    }

    // ========== Context Menu ==========
    function showContextMenu(e, msgId, text, isMine, timestamp) {
        const existing = document.querySelector('.context-menu');
        if (existing) existing.remove();
        
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        
        let x = e.clientX, y = e.clientY;
        if (e.touches) { x = e.touches[0].clientX; y = e.touches[0].clientY; }
        
        document.body.appendChild(menu);
        
        const rect = menu.getBoundingClientRect();
        let left = x, top = y;
        if (left + rect.width > window.innerWidth) left = window.innerWidth - rect.width - 10;
        if (top + rect.height > window.innerHeight) top = window.innerHeight - rect.height - 10;
        if (left < 10) left = 10;
        if (top < 10) top = 10;
        
        menu.style.left = left + 'px';
        menu.style.top = top + 'px';
        
        const replyBtn = document.createElement('button');
        replyBtn.innerHTML = '<iconify-icon icon="mdi:reply"></iconify-icon> Reply';
        replyBtn.onclick = () => {
            replyingTo = { id: msgId, text: text, senderName: isMine ? 'You' : activeChatUser?.displayName };
            const replyWho = $('reply-who');
            const replyWhat = $('reply-what');
            const replyBar = $('reply-bar');
            if (replyWho) replyWho.textContent = `Replying to ${replyingTo.senderName}`;
            if (replyWhat) replyWhat.textContent = text.length > 60 ? text.substring(0, 60) + '...' : text;
            if (replyBar) replyBar.style.display = 'flex';
            menu.remove();
            if (messageInput) messageInput.focus();
        };
        menu.appendChild(replyBtn);
        
        const copyBtn = document.createElement('button');
        copyBtn.innerHTML = '<iconify-icon icon="mdi:content-copy"></iconify-icon> Copy';
        copyBtn.onclick = () => { navigator.clipboard.writeText(text); menu.remove(); };
        menu.appendChild(copyBtn);
        
        if (isMine) {
            const now = Date.now();
            if (now - (timestamp || 0) < EDIT_WINDOW) {
                const editBtn = document.createElement('button');
                editBtn.innerHTML = '<iconify-icon icon="mdi:pencil"></iconify-icon> Edit';
                editBtn.onclick = () => {
                    editingMessageId = msgId;
                    const editMsgInput = $('edit-msg-input');
                    if (editMsgInput) editMsgInput.value = text;
                    showModal(editMsgModal);
                    menu.remove();
                };
                menu.appendChild(editBtn);
            }
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'danger';
            deleteBtn.innerHTML = '<iconify-icon icon="mdi:delete"></iconify-icon> Delete';
            deleteBtn.onclick = () => {
                if (confirm('Delete this message?')) {
                    deleteDoc(doc(db, "conversations", activeChatId, "messages", msgId));
                }
                menu.remove();
            };
            menu.appendChild(deleteBtn);
        }
        
        const reactionsRow = document.createElement('div');
        reactionsRow.style.display = 'flex';
        reactionsRow.style.gap = '8px';
        reactionsRow.style.padding = '8px';
        reactionsRow.style.borderTop = '1px solid var(--border-color)';
        reactionsRow.style.marginTop = '4px';
        const emojis = ['❤️', '😂', '🔥', '👍', '😮', '🎉'];
        emojis.forEach(emoji => {
            const reactionBtn = document.createElement('button');
            reactionBtn.innerHTML = `<span style="font-size:20px;">${emoji}</span>`;
            reactionBtn.style.flex = '1';
            reactionBtn.style.justifyContent = 'center';
            reactionBtn.onclick = () => { window.addReaction(msgId, emoji); menu.remove(); };
            reactionsRow.appendChild(reactionBtn);
        });
        menu.appendChild(reactionsRow);
        
        const removeMenu = (e) => {
            if (!menu.contains(e.target)) menu.remove();
            document.removeEventListener('click', removeMenu);
            document.removeEventListener('touchstart', removeMenu);
        };
        setTimeout(() => {
            document.addEventListener('click', removeMenu);
            document.addEventListener('touchstart', removeMenu);
        }, 100);
    }

    function closeChat() {
        if (currentUnsubscribes.messages) safeUnsubscribe(currentUnsubscribes.messages);
        if (currentUnsubscribes.typing) safeUnsubscribe(currentUnsubscribes.typing);
        if (currentUnsubscribes.status) safeUnsubscribe(currentUnsubscribes.status);
        
        activeChatId = null;
        activeChatUser = null;
        replyingTo = null;
        
        const replyBar = $('reply-bar');
        if (replyBar) replyBar.style.display = 'none';
        
        if (welcomeScreen) welcomeScreen.style.display = 'flex';
        if (chatScreen) chatScreen.style.display = 'none';
        if (messagesContainer) messagesContainer.innerHTML = '';
        
        document.body.classList.remove('chat-open');
    }

    // ========== Send Message ==========
    async function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;

        const now = Date.now();
        if (now - lastMessageTime < SPAM_COOLDOWN) {
            if (sendBtn) sendBtn.classList.add('shake');
            setTimeout(() => {
                if (sendBtn) sendBtn.classList.remove('shake');
            }, 300);
            return;
        }
        lastMessageTime = now;

        if (!activeChatId && activeChatUser) await startChat(activeChatUser);
        if (!activeChatId) return;

        const messageData = {
            senderId: currentUser.uid,
            text: text,
            timestamp: serverTimestamp(),
            delivered: false,
            seen: false,
            reactions: {}
        };
        if (replyingTo) {
            messageData.replyTo = {
                id: replyingTo.id,
                text: replyingTo.text,
                senderName: replyingTo.senderName
            };
        }

        if (messageInput) messageInput.value = '';
        updateSendButton();
        updateCharCounter();
        localStorage.removeItem(`draft_${activeChatId}`);
        
        sendTyping(activeChatId, currentUser.uid, false);

        try {
            await addDoc(collection(db, "conversations", activeChatId, "messages"), messageData);
            await updateDoc(doc(db, "conversations", activeChatId), {
                lastMessage: text,
                lastMessageSender: currentUser.uid,
                updatedAt: serverTimestamp(),
                [`unread.${activeChatUser.uid}`]: increment(1)
            });
            replyingTo = null;
            const replyBar = $('reply-bar');
            if (replyBar) replyBar.style.display = 'none';
            if (messageInput) messageInput.focus();
        } catch (e) {
            console.error(e);
            if (messageInput) messageInput.value = text;
            updateSendButton();
            updateCharCounter();
        }
    }

    if (sendBtn) sendBtn.addEventListener('click', sendMessage);
    if (messageInput) {
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        messageInput.addEventListener('input', () => {
            if (!activeChatId) return;
            sendTyping(activeChatId, currentUser.uid, true);
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                sendTyping(activeChatId, currentUser.uid, false);
            }, 2000);
            localStorage.setItem(`draft_${activeChatId}`, messageInput.value);
        });
    }

    const cancelReply = $('cancel-reply');
    if (cancelReply) {
        cancelReply.addEventListener('click', () => {
            replyingTo = null;
            const replyBar = $('reply-bar');
            if (replyBar) replyBar.style.display = 'none';
        });
    }

    // ========== Emoji Picker ==========
    const emojiBtn = $('emoji-btn');
    if (emojiBtn) {
        emojiBtn.addEventListener('click', () => {
            const existing = document.querySelector('.emoji-picker');
            if (existing) { existing.remove(); return; }
            const picker = document.createElement('div');
            picker.className = 'emoji-picker';
            const emojis = ['😀', '😂', '😍', '🔥', '👍', '❤️', '🎉', '✨', '😢', '😎', '🥺', '🤣', '💀', '👋', '🙏', '💯'];
            emojis.forEach(emoji => {
                const span = document.createElement('span');
                span.textContent = emoji;
                span.onclick = () => {
                    if (messageInput) messageInput.value += emoji;
                    updateSendButton();
                    updateCharCounter();
                    picker.remove();
                    if (messageInput) messageInput.focus();
                };
                picker.appendChild(span);
            });
            document.body.appendChild(picker);
            const removePicker = (e) => {
                if (!picker.contains(e.target)) picker.remove();
                document.removeEventListener('click', removePicker);
                document.removeEventListener('touchstart', removePicker);
            };
            setTimeout(() => {
                document.addEventListener('click', removePicker);
                document.addEventListener('touchstart', removePicker);
            }, 100);
        });
    }

    // ========== Reactions ==========
    window.addReaction = async function(msgId, emoji) {
        if (!activeChatId) return;
        const msgRef = doc(db, "conversations", activeChatId, "messages", msgId);
        const snap = await getDoc(msgRef);
        if (!snap.exists()) return;
        const reactions = snap.data().reactions || {};
        if (!reactions[emoji]) reactions[emoji] = [];
        const idx = reactions[emoji].indexOf(currentUser.uid);
        if (idx > -1) reactions[emoji].splice(idx, 1);
        else reactions[emoji].push(currentUser.uid);
        if (reactions[emoji].length === 0) delete reactions[emoji];
        await updateDoc(msgRef, { reactions });
    };

    // ========== Edit Message ==========
    const editMsgSave = $('edit-msg-save');
    if (editMsgSave) {
        editMsgSave.addEventListener('click', async () => {
            const newTextInput = $('edit-msg-input');
            const newText = newTextInput ? newTextInput.value.trim() : '';
            if (!newText || !editingMessageId || !activeChatId) return;
            await updateDoc(doc(db, "conversations", activeChatId, "messages", editingMessageId), {
                text: newText,
                edited: true,
                editedAt: serverTimestamp()
            });
            hideModal(editMsgModal);
            editingMessageId = null;
        });
    }

    const editMsgCancel = $('edit-msg-cancel');
    if (editMsgCancel) {
        editMsgCancel.addEventListener('click', () => {
            hideModal(editMsgModal);
            editingMessageId = null;
        });
    }

    // ========== User Info ==========
    function showUserInfo(userData) {
        const userAvatar = $('user-avatar');
        const userName = $('user-name');
        const userUsername = $('user-username');
        const userEmail = $('user-email');
        const userBio = $('user-bio');
        const userUid = $('user-uid');
        const userCreated = $('user-created');
        const userLastseen = $('user-lastseen');
        
        if (userAvatar) userAvatar.textContent = (userData.displayName || 'U').charAt(0).toUpperCase();
        if (userName) userName.textContent = userData.displayName || 'Unknown';
        if (userUsername) userUsername.textContent = '@' + (userData.username || 'user');
        if (userEmail) userEmail.textContent = userData.email || '-';
        if (userBio) userBio.textContent = userData.bio || 'No bio yet';
        if (userUid) userUid.textContent = userData.uid || '-';
        if (userCreated) userCreated.textContent = userData.createdAt?.toDate ? userData.createdAt.toDate().toLocaleDateString() : '-';
        if (userLastseen) userLastseen.textContent = userData.lastLogin?.toDate ? userData.lastLogin.toDate().toLocaleString() : 'Recently';
        showModal(userModal);
    }

    const userCloseBtn = $('user-close-btn');
    if (userCloseBtn) userCloseBtn.addEventListener('click', () => hideModal(userModal));
    
    const chatAvatar = $('chat-avatar');
    if (chatAvatar) chatAvatar.addEventListener('click', () => { if (activeChatUser) showUserInfo(activeChatUser); });
    
    const chatInfoBtn = $('chat-info-btn');
    if (chatInfoBtn) chatInfoBtn.addEventListener('click', () => { if (activeChatUser) showUserInfo(activeChatUser); });

    // ========== Edit Profile ==========
    const profileSection = $('profile-section');
    if (profileSection) {
        profileSection.addEventListener('click', () => {
            const editName = $('edit-name');
            const editBio = $('edit-bio');
            if (editName) editName.value = currentUserData.displayName || '';
            if (editBio) editBio.value = currentUserData.bio || '';
            showModal(editModal);
        });
    }

    const editCancel = $('edit-cancel');
    if (editCancel) editCancel.addEventListener('click', () => hideModal(editModal));

    const editSave = $('edit-save');
    if (editSave) {
        editSave.addEventListener('click', async () => {
            const editName = $('edit-name');
            const editBio = $('edit-bio');
            const newName = editName ? editName.value.trim() : '';
            const newBio = editBio ? editBio.value.trim() : '';
            if (!newName) { alert('Name cannot be empty'); return; }
            const userRef = doc(db, "users", currentUser.uid);
            await updateDoc(userRef, {
                displayName: newName,
                bio: newBio,
                searchKeywords: [currentUserData.username, newName.toLowerCase()]
            });
            currentUserData = { ...currentUserData, displayName: newName, bio: newBio };
            updateSelfUI();
            hideModal(editModal);
        });
    }

    // ========== Logout ==========
    const logoutBtn = $('logout-btn');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', async () => {
            if (!confirm('Sign out?')) return;
            if (currentUser) {
                await setUserStatus(currentUser.uid, 'offline');
            }
            await signOut(auth);
            window.location.href = "auth.html";
        });
    }

    // ========== Cleanup on page unload ==========
    window.addEventListener('beforeunload', () => {
        if (currentUser) {
            setUserStatus(currentUser.uid, 'offline');
        }
        if (conversationsUnsubscribe) safeUnsubscribe(conversationsUnsubscribe);
        if (currentUnsubscribes.messages) safeUnsubscribe(currentUnsubscribes.messages);
        if (currentUnsubscribes.typing) safeUnsubscribe(currentUnsubscribes.typing);
        if (currentUnsubscribes.status) safeUnsubscribe(currentUnsubscribes.status);
        for (const unsub of statusUnsubscribes.values()) safeUnsubscribe(unsub);
        for (const unsub of typingUnsubscribes.values()) safeUnsubscribe(unsub);
    });

    console.log('✅ NovaChat Ready');
    console.log('📌 Features: No page refresh, Incremental message updates, RTDB presence, RTDB typing, Offline support');
</script>
</body>
</html>
