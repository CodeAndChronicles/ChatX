<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NovaChat</title>
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0F172A;
            color: #F8FAFC;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: #1E293B;
            border-right: 1px solid rgba(124, 58, 237, 0.2);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .sidebar-top {
            padding: 20px 16px;
            border-bottom: 1px solid rgba(124, 58, 237, 0.2);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: 700;
            color: #9D5CF6;
            margin-bottom: 16px;
        }

        .logo iconify-icon {
            font-size: 28px;
        }

        .new-chat-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(135deg, #7C3AED, #5B21B6);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .new-chat-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .search-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #0F172A;
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 12px;
            padding: 10px 14px;
            margin: 12px 16px;
        }

        .search-bar iconify-icon {
            color: #9D5CF6;
            font-size: 18px;
            flex-shrink: 0;
        }

        .search-bar input {
            background: transparent;
            border: none;
            outline: none;
            color: #F8FAFC;
            font-size: 14px;
            width: 100%;
        }

        .search-bar input::placeholder {
            color: #64748B;
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: #64748B;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 16px;
            margin-top: 4px;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 8px;
        }

        .chat-list::-webkit-scrollbar {
            width: 4px;
        }

        .chat-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-list::-webkit-scrollbar-thumb {
            background: rgba(124, 58, 237, 0.4);
            border-radius: 4px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 2px;
        }

        .chat-item:hover {
            background: rgba(124, 58, 237, 0.15);
        }

        .chat-item.active {
            background: rgba(124, 58, 237, 0.25);
        }

        .user-avatar {
            width: 42px;
            height: 42px;
            min-width: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7C3AED, #5B21B6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: #fff;
        }

        .chat-item-info {
            flex: 1;
            overflow: hidden;
        }

        .chat-item-info p {
            font-size: 14px;
            font-weight: 600;
            color: #F8FAFC;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-item-info span {
            font-size: 12px;
            color: #64748B;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            margin-top: 2px;
        }

        .sidebar-bottom {
            padding: 16px;
            border-top: 1px solid rgba(124, 58, 237, 0.2);
            background: rgba(15, 23, 42, 0.5);
        }

        .current-user {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .current-user .user-avatar {
            width: 38px;
            height: 38px;
            min-width: 38px;
            font-size: 14px;
        }

        .user-details p {
            font-size: 13px;
            font-weight: 600;
            color: #F8FAFC;
        }

        .user-details span {
            font-size: 11px;
            color: #34D399;
        }

        .logout-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: #F87171;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(248, 113, 113, 0.2);
            border-color: #F87171;
        }

        .logout-btn iconify-icon {
            font-size: 18px;
        }

        /* ========== CHAT AREA ========== */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0F172A;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            color: #334155;
        }

        .empty-state iconify-icon {
            font-size: 80px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 20px;
            font-weight: 600;
            color: #475569;
        }

        .empty-state p {
            font-size: 14px;
            color: #64748B;
        }

        .chat-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: #1E293B;
            border-bottom: 1px solid rgba(124, 58, 237, 0.2);
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-left .user-avatar {
            width: 42px;
            height: 42px;
            min-width: 42px;
        }

        .chat-header-info p {
            font-size: 15px;
            font-weight: 700;
            color: #F8FAFC;
        }

        .chat-header-info span {
            font-size: 12px;
            color: #34D399;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .messages-container::-webkit-scrollbar {
            width: 4px;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(124, 58, 237, 0.3);
            border-radius: 4px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 70%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.received {
            align-self: flex-start;
        }

        .message.sent {
            align-self: flex-end;
        }

        .message-bubble {
            padding: 10px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.received .message-bubble {
            background: #1E293B;
            color: #F8FAFC;
            border-bottom-left-radius: 4px;
        }

        .message.sent .message-bubble {
            background: linear-gradient(135deg, #7C3AED, #5B21B6);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            font-size: 11px;
            color: #64748B;
            margin-top: 4px;
            padding: 0 4px;
        }

        .message.sent .message-time {
            text-align: right;
        }

        .message-input-area {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 24px;
            background: #1E293B;
            border-top: 1px solid rgba(124, 58, 237, 0.2);
        }

        .message-input-area input {
            flex: 1;
            background: #0F172A;
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 24px;
            padding: 12px 20px;
            color: #F8FAFC;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .message-input-area input:focus {
            border-color: #7C3AED;
        }

        .message-input-area input::placeholder {
            color: #475569;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            min-width: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7C3AED, #5B21B6);
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .send-btn:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* ========== USER PANEL ========== */
        .user-panel {
            width: 280px;
            min-width: 280px;
            background: #1E293B;
            border-left: 1px solid rgba(124, 58, 237, 0.2);
            padding: 24px 16px;
            overflow-y: auto;
        }

        .user-panel::-webkit-scrollbar {
            width: 4px;
        }

        .user-panel::-webkit-scrollbar-thumb {
            background: rgba(124, 58, 237, 0.4);
            border-radius: 4px;
        }

        .panel-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(124, 58, 237, 0.2);
            margin-bottom: 16px;
        }

        .panel-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7C3AED, #5B21B6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            border: 3px solid #7C3AED;
            margin-bottom: 12px;
        }

        .panel-header h3 {
            font-size: 16px;
            font-weight: 700;
            color: #F8FAFC;
            margin-bottom: 4px;
        }

        .panel-header p {
            font-size: 12px;
            color: #64748B;
        }

        .panel-section {
            background: #0F172A;
            border-radius: 12px;
            border: 1px solid rgba(124, 58, 237, 0.15);
            margin-bottom: 12px;
            overflow: hidden;
        }

        .panel-section-title {
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 600;
            color: #94A3B8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(124, 58, 237, 0.15);
        }

        .panel-section-content {
            padding: 12px 16px;
            font-size: 13px;
            color: #94A3B8;
            line-height: 1.6;
        }

        .no-selection {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #475569;
            text-align: center;
            padding: 20px;
        }

        .no-selection iconify-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .no-selection p {
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="app">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">

        <div class="sidebar-top">
            <div class="logo">
                <iconify-icon icon="mdi:chat-processing-outline"></iconify-icon>
                NovaChat
            </div>
            <button class="new-chat-btn">
                <iconify-icon icon="mdi:plus"></iconify-icon>
                New Chat
            </button>
        </div>

        <div class="search-bar">
            <iconify-icon icon="mdi:magnify"></iconify-icon>
            <input type="text" id="search-input" placeholder="Search users..."/>
        </div>

        <div id="search-results"></div>

        <div class="section-title">Recent Chats</div>
        <div class="chat-list" id="conversations-list"></div>

        <div class="sidebar-bottom">
            <div class="current-user">
                <div class="user-avatar" id="sidebar-avatar">U</div>
                <div class="user-details">
                    <p id="sidebar-name">User</p>
                    <span>Online</span>
                </div>
            </div>
            <button class="logout-btn" id="btn-logout">
                <iconify-icon icon="mdi:logout"></iconify-icon>
                Sign Out
            </button>
        </div>

    </aside>

    <!-- ===== CHAT AREA ===== -->
    <main class="chat-area">

        <div class="empty-state" id="empty-state">
            <iconify-icon icon="mdi:chat-outline"></iconify-icon>
            <h3>Welcome to NovaChat</h3>
            <p>Select a conversation or start a new one</p>
        </div>

        <div class="chat-view" id="chat-view" style="display: none;">
            <div class="chat-header">
                <div class="chat-header-left">
                    <div class="user-avatar" id="chat-avatar">U</div>
                    <div class="chat-header-info">
                        <p id="chat-name">User</p>
                        <span id="chat-status">offline</span>
                    </div>
                </div>
            </div>

            <div class="messages-container" id="messages-container"></div>

            <div class="message-input-area">
                <input type="text" id="message-input" placeholder="Type a message..."/>
                <button class="send-btn" id="btn-send">
                    <iconify-icon icon="mdi:send"></iconify-icon>
                </button>
            </div>
        </div>

    </main>

    <!-- ===== USER PANEL ===== -->
    <aside class="user-panel" id="user-panel">
        <div class="no-selection" id="panel-empty">
            <iconify-icon icon="mdi:account-circle-outline"></iconify-icon>
            <p>Select a chat to view profile</p>
        </div>

        <div id="panel-content" style="display: none;">
            <div class="panel-header">
                <div class="panel-avatar" id="panel-avatar">U</div>
                <h3 id="panel-name">User</h3>
                <p id="panel-username">@username</p>
            </div>

            <div class="panel-section">
                <div class="panel-section-title">About</div>
                <div class="panel-section-content" id="panel-bio">
                    No bio available
                </div>
            </div>

            <div class="panel-section">
                <div class="panel-section-title">Status</div>
                <div class="panel-section-content" id="panel-status">
                    Offline
                </div>
            </div>
        </div>
    </aside>

</div>

<script type="module">
    // استيراد Firebase config
    import { auth, db } from "./firebase-config.js";
    
    // استيراد دوال Firebase
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { 
        collection, doc, getDoc, getDocs, setDoc, addDoc, 
        query, where, orderBy, onSnapshot, serverTimestamp, limit 
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ===== المتغيرات العامة =====
    let currentUser = null;
    let currentUserData = null;
    let activeConversationId = null;
    let messagesListener = null;

    // ===== التحقق من تسجيل الدخول =====
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = "auth.html";
            return;
        }
        
        currentUser = user;
        console.log("✅ User authenticated:", user.uid);
        
        try {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                currentUserData = userDoc.data();
                console.log("✅ User data loaded:", currentUserData);
                initializeApp();
            } else {
                console.error("❌ User document not found");
                // إنشاء وثيقة مستخدم إذا لم تكن موجودة
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    email: user.email,
                    displayName: user.displayName || user.email.split('@')[0],
                    username: (user.displayName || user.email.split('@')[0]).toLowerCase(),
                    photoURL: "",
                    theme: "dark",
                    bio: "",
                    status: "online",
                    createdAt: serverTimestamp(),
                    lastLogin: serverTimestamp(),
                    searchKeywords: [
                        (user.displayName || user.email.split('@')[0]).toLowerCase(),
                        user.email.split('@')[0].toLowerCase()
                    ]
                });
                currentUserData = (await getDoc(doc(db, "users", user.uid))).data();
                initializeApp();
            }
        } catch (error) {
            console.error("❌ Error loading user:", error);
        }
    });

    // ===== تهيئة التطبيق =====
    function initializeApp() {
        // تحديث معلومات المستخدم في الشريط الجانبي
        document.getElementById('sidebar-name').textContent = currentUserData.displayName || 'User';
        document.getElementById('sidebar-avatar').textContent = 
            (currentUserData.displayName || 'U').charAt(0).toUpperCase();
        
        // تحميل المحادثات
        loadConversations();
        
        // إعداد البحث
        setupSearch();
        
        // إعداد إرسال الرسائل
        setupMessageSending();
        
        // إعداد زر تسجيل الخروج
        setupLogout();
        
        console.log("🚀 App initialized successfully");
    }

    // ===== تحميل المحادثات =====
    function loadConversations() {
        const conversationsQuery = query(
            collection(db, "conversations"),
            where("participants", "array-contains", currentUser.uid),
            orderBy("updatedAt", "desc")
        );

        onSnapshot(conversationsQuery, async (snapshot) => {
            const conversationsList = document.getElementById('conversations-list');
            conversationsList.innerHTML = '';

            if (snapshot.empty) {
                conversationsList.innerHTML = `
                    <div style="padding: 20px; text-align: center; color: #64748B; font-size: 13px;">
                        No conversations yet
                    </div>`;
                return;
            }

            for (const convDoc of snapshot.docs) {
                const conversation = convDoc.data();
                const otherUserId = conversation.participants.find(id => id !== currentUser.uid);
                
                if (!otherUserId) continue;

                try {
                    const otherUserDoc = await getDoc(doc(db, "users", otherUserId));
                    if (!otherUserDoc.exists()) continue;
                    
                    const otherUser = otherUserDoc.data();
                    
                    const chatItem = document.createElement('div');
                    chatItem.className = 'chat-item';
                    if (convDoc.id === activeConversationId) {
                        chatItem.classList.add('active');
                    }

                    chatItem.innerHTML = `
                        <div class="user-avatar">${(otherUser.displayName || 'U').charAt(0).toUpperCase()}</div>
                        <div class="chat-item-info">
                            <p>${otherUser.displayName || 'Unknown'}</p>
                            <span>${conversation.lastMessage || 'Start chatting...'}</span>
                        </div>
                    `;

                    chatItem.addEventListener('click', () => {
                        openConversation(convDoc.id, otherUser);
                    });

                    conversationsList.appendChild(chatItem);
                } catch (error) {
                    console.error("Error loading conversation:", error);
                }
            }
        });
    }

    // ===== البحث عن مستخدمين =====
    function setupSearch() {
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');

        searchInput.addEventListener('input', async () => {
            const searchTerm = searchInput.value.trim().toLowerCase();
            
            if (!searchTerm || searchTerm.length < 2) {
                searchResults.innerHTML = '';
                return;
            }

            try {
                const usersQuery = query(
                    collection(db, "users"),
                    where("searchKeywords", "array-contains", searchTerm),
                    limit(10)
                );

                const snapshot = await getDocs(usersQuery);
                searchResults.innerHTML = '';

                if (snapshot.empty) {
                    searchResults.innerHTML = `
                        <div style="padding: 12px; text-align: center; color: #64748B; font-size: 13px;">
                            No users found
                        </div>`;
                    return;
                }

                snapshot.forEach(userDoc => {
                    const userData = userDoc.data();
                    if (userData.uid === currentUser.uid) return;

                    const userItem = document.createElement('div');
                    userItem.className = 'chat-item';
                    userItem.innerHTML = `
                        <div class="user-avatar">${(userData.displayName || 'U').charAt(0).toUpperCase()}</div>
                        <div class="chat-item-info">
                            <p>${userData.displayName || 'Unknown'}</p>
                            <span>@${userData.username || 'user'}</span>
                        </div>
                    `;

                    userItem.addEventListener('click', () => {
                        searchInput.value = '';
                        searchResults.innerHTML = '';
                        startConversation(userData);
                    });

                    searchResults.appendChild(userItem);
                });
            } catch (error) {
                console.error("Search error:", error);
            }
        });
    }

    // ===== بدء محادثة جديدة =====
    async function startConversation(otherUser) {
        try {
            const participants = [currentUser.uid, otherUser.uid].sort();
            const conversationId = participants.join('_');
            const conversationRef = doc(db, "conversations", conversationId);
            const conversationDoc = await getDoc(conversationRef);

            if (!conversationDoc.exists()) {
                await setDoc(conversationRef, {
                    participants: [currentUser.uid, otherUser.uid],
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp(),
                    lastMessage: "",
                    lastMessageSender: ""
                });
                console.log("✅ New conversation created");
            }

            openConversation(conversationId, otherUser);
        } catch (error) {
            console.error("Error starting conversation:", error);
        }
    }

    // ===== فتح محادثة =====
    function openConversation(conversationId, otherUser) {
        // تحديث المتغير العام
        activeConversationId = conversationId;

        // إلغاء مستمع الرسائل السابق
        if (messagesListener) {
            messagesListener();
            messagesListener = null;
        }

        // إظهار واجهة المحادثة
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('chat-view').style.display = 'flex';
        document.getElementById('panel-empty').style.display = 'none';
        document.getElementById('panel-content').style.display = 'block';

        // تحديث رأس المحادثة
        document.getElementById('chat-name').textContent = otherUser.displayName || 'Unknown';
        document.getElementById('chat-status').textContent = otherUser.status || 'offline';
        document.getElementById('chat-avatar').textContent = 
            (otherUser.displayName || 'U').charAt(0).toUpperCase();

        // تحديث اللوحة الجانبية
        document.getElementById('panel-name').textContent = otherUser.displayName || 'Unknown';
        document.getElementById('panel-username').textContent = '@' + (otherUser.username || 'user');
        document.getElementById('panel-avatar').textContent = 
            (otherUser.displayName || 'U').charAt(0).toUpperCase();
        document.getElementById('panel-bio').textContent = otherUser.bio || 'No bio available';
        document.getElementById('panel-status').textContent = otherUser.status || 'offline';

        // تحميل الرسائل
        loadMessages(conversationId);
    }

    // ===== تحميل الرسائل =====
    function loadMessages(conversationId) {
        const messagesQuery = query(
            collection(db, "conversations", conversationId, "messages"),
            orderBy("timestamp", "asc")
        );

        const messagesContainer = document.getElementById('messages-container');

        messagesListener = onSnapshot(messagesQuery, (snapshot) => {
            messagesContainer.innerHTML = '';

            if (snapshot.empty) {
                messagesContainer.innerHTML = `
                    <div style="text-align: center; color: #64748B; padding: 40px;">
                        <iconify-icon icon="mdi:chat-processing-outline" style="font-size: 48px; margin-bottom: 12px; display: block;"></iconify-icon>
                        Start the conversation!
                    </div>`;
                return;
            }

            snapshot.forEach(messageDoc => {
                const message = messageDoc.data();
                const isSentByMe = message.senderId === currentUser.uid;

                const messageElement = document.createElement('div');
                messageElement.className = `message ${isSentByMe ? 'sent' : 'received'}`;

                let timeString = '';
                if (message.timestamp) {
                    const date = message.timestamp.toDate();
                    timeString = date.toLocaleTimeString([], { 
                        hour: '2-digit', 
                        minute: '2-digit' 
                    });
                }

                messageElement.innerHTML = `
                    <div class="message-bubble">${message.text || ''}</div>
                    <div class="message-time">${timeString}</div>
                `;

                messagesContainer.appendChild(messageElement);
            });

            // التمرير التلقائي للأسفل
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        });
    }

    // ===== إرسال الرسائل =====
    function setupMessageSending() {
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('btn-send');

        async function sendMessage() {
            const text = messageInput.value.trim();
            
            if (!text || !activeConversationId) return;

            messageInput.value = '';
            messageInput.focus();

            try {
                // إضافة الرسالة
                const messagesRef = collection(db, "conversations", activeConversationId, "messages");
                await addDoc(messagesRef, {
                    senderId: currentUser.uid,
                    text: text,
                    timestamp: serverTimestamp(),
                    type: "text",
                    read: false
                });

                // تحديث المحادثة
                const conversationRef = doc(db, "conversations", activeConversationId);
                await setDoc(conversationRef, {
                    lastMessage: text,
                    lastMessageSender: currentUser.uid,
                    updatedAt: serverTimestamp()
                }, { merge: true });

                console.log("✅ Message sent");
            } catch (error) {
                console.error("❌ Error sending message:", error);
                messageInput.value = text; // استعادة النص في حالة الخطأ
            }
        }

        sendButton.addEventListener('click', sendMessage);

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    }

    // ===== تسجيل الخروج =====
    function setupLogout() {
        const logoutButton = document.getElementById('btn-logout');
        
        logoutButton.addEventListener('click', async () => {
            try {
                // تحديث حالة المستخدم إلى offline
                if (currentUser) {
                    const userRef = doc(db, "users", currentUser.uid);
                    await setDoc(userRef, { 
                        status: "offline",
                        lastLogin: serverTimestamp()
                    }, { merge: true });
                }
                
                // تسجيل الخروج
                await signOut(auth);
                console.log("✅ Signed out successfully");
                
                // التوجيه إلى صفحة تسجيل الدخول
                window.location.href = "auth.html";
            } catch (error) {
                console.error("❌ Error signing out:", error);
                alert("Failed to sign out. Please try again.");
            }
        });
    }

    console.log("🎨 NovaChat UI ready");
</script>
